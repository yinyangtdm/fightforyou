          - paragraph [ref=e146]: Our job is to understand your rights. Give our Northern Virginia employment lawyers a call or come in for a consultation to find out if we can help you protect your rights.
          - heading "Workplace Discrimination" [level=2] [ref=e147]
          - paragraph [ref=e148]: A workplace should not be discriminatory. It should not be hostile. These sorts of environments chip away at the self-confidence of employees and prevent individuals from taking pride in their work. These environments can also create additional stress, causing individuals to lose sleep or develop other stress-related health disorders. Individuals undergoing harassment or discrimination at work can see their personal lives suffer, bringing tension into their homes and straining relationships with friends and family. When these situations arise, our Northern Virginia employment attorneys can help.
          - paragraph [ref=e151]: We can help you get the compensation you deserve, such as lost wages, compensation for emotional harm, or future wages that you would have earned if you had been treated fairly.
