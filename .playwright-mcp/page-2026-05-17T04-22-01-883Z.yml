            - heading [level=1] [ref=e309]
            - heading "What Is Your Personal Injury Claim Worth?" [level=2] [ref=e310]:
              - strong [ref=e311]: What Is Your Personal Injury Claim Worth?
            - paragraph [ref=e312]: "Missouri personal injury law is intended to restore what you lost, to the extent possible. There are three kinds of damages you may be awarded:"
            - heading "Financial Damages" [level=3] [ref=e313]:
              - strong [ref=e314]: Financial Damages
            - paragraph [ref=e315]: "An injured person and their loved ones can seek compensation for the financial costs of the injury. For example:"
            - list [ref=e316]:
              - listitem [level=1] [ref=e317]: Past and future medical bills
              - listitem [level=1] [ref=e318]: Cost of rehabilitation, therapy, and ongoing care
              - listitem [level=1] [ref=e319]: Wages for caregivers needed to do things the injured person can no longer do for themselves
              - listitem [level=1] [ref=e320]: Disability accommodations like wheelchair ramps
              - listitem [level=1] [ref=e321]: Property damage
              - listitem [level=1] [ref=e322]: Out-of-pocket expenses like mileage to travel to rehab appointments
              - listitem [level=1] [ref=e323]: Lost wages during recovery
              - listitem [level=1] [ref=e324]: Lost future earning capacity
            - paragraph [ref=e325]: An experienced personal injury lawyer understands not only what your injury has cost you so far, but how it may impact your future finances.
            - heading "Non-Economic Damages" [level=3] [ref=e326]:
              - strong [ref=e327]: Non-Economic Damages
            - paragraph [ref=e328]: "A personal injury can cause damages that don’t come with a price tag. These intangible losses are real, disruptive, and deserve compensation. Non-economic damages may include:"
            - list [ref=e329]:
              - listitem [level=1] [ref=e330]: Pain and suffering
              - listitem [level=1] [ref=e331]: Emotional distress
              - listitem [level=1] [ref=e332]: Post-traumatic stress disorder, depression, and anxiety
              - listitem [level=1] [ref=e333]: Loss of enjoyment of life
              - listitem [level=1] [ref=e334]: Disfigurement
            - heading "Punitive Damages" [level=3] [ref=e335]:
              - strong [ref=e336]: Punitive Damages
            - paragraph [ref=e337]: In some cases, a court may find the party at fault in your injury acted in a particularly reckless manner. In those cases, a judge or jury may award punitive damages to punish the defendant.
            - heading "How Much Can I Get From My Personal Injury Claim?" [level=3] [ref=e338]:
              - strong [ref=e339]: How Much Can I Get From My Personal Injury Claim?
            - paragraph [ref=e340]: There is no average or standard range for personal injury compensation. The amount depends on the facts of your case, including the severity of your injuries, the recklessness of the conduct, and the limits of insurance.
            - paragraph [ref=e341]
            - paragraph [ref=e342]: While past results are not a guarantee of future outcomes, Fernandez Law has a solid track record of recovering far more than our clients had hoped for.
            - paragraph [ref=e343]: "Past Outcomes:"
            - list [ref=e344]:
              - listitem [level=1] [ref=e345]: $15 million for the victim of a truck accident
              - listitem [level=1] [ref=e346]: $7 million in a medical negligence claim
              - listitem [level=1] [ref=e347]: $3 million for a fall on an icy sidewalk
              - listitem [level=1] [ref=e348]: $11 million for a factory workplace accident
            - paragraph [ref=e349]: In your no-obligation consultation, we’ll listen to your story and give you an honest estimate of what your claim might be worth.
          - link "What's My Claim Worth" [ref=e353] [cursor=pointer]:
            - /url: https://stltriallawyers.com/contact-us/
          - generic [ref=e356]:
            - heading [level=2] [ref=e357]
            - heading "What Happens When You Call Fernandez Law" [level=2] [ref=e358]:
              - strong [ref=e359]: What Happens When You Call Fernandez Law
            - paragraph [ref=e360]: FREE CONSULTATION
            - paragraph [ref=e361]: When you reach out to Fernandez Law, you’ll get a free, no-obligation consultation. Our experienced, compassionate team will listen to your story and gather the details of your case.
            - paragraph [ref=e362]: "Then we’ll give you our honest assessment: whether you have a case, how strong it is, an estimate on possible damages, and how long it might take to resolve."
            - paragraph [ref=e363]: Once we take your case, the high-pressure insurance calls you’ve been getting stop. When an attorney or insurer calls you, tell them any communication has to go through us.
            - paragraph [ref=e364]: INDEPENDENT INVESTIGATION
            - paragraph [ref=e365]: We’re not content to read reports and file paperwork. We’ll launch our own investigation into the circumstances surrounding your injury.
            - paragraph [ref=e366]: We gather evidence, review records, interview witnesses, and consult with experts to build your case.
            - paragraph [ref=e367]: NEGOTIATION
            - paragraph [ref=e368]: Based on the data from our investigation, what the injury has cost you so far, and what it’s likely to cost you in the future, we calculate a demand for damages.
            - paragraph [ref=e369]: We put forth our demand and negotiate with the defendant to get you a fair settlement.
            - paragraph [ref=e370]: TRIAL PREPARATION
            - paragraph [ref=e371]: Most personal injury cases in St. Louis settle out of court. But we build every case as though it is going to trial.
            - paragraph [ref=e372]: Insurers know we’re not afraid to take a claim to trial. They don’t bother starting with low-ball offers when we’re on the case.
            - paragraph [ref=e373]: RESOLUTION AND RECOVERY
            - paragraph [ref=e374]: Once the case ends, we handle all the paperwork, disbursements, and logistics to get your award into your hands.
            - paragraph [ref=e375]: Fernandez Law works on a contingency fee basis. Our fee is based on a percentage of your award, with no fees or up-front costs. That means if we don’t win, you don’t pay.
            - paragraph [ref=e376]
