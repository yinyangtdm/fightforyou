              - generic [ref=e378]: CALL (314) 433-9131 TO SCHEDULE YOU CONSULTATION
            - paragraph [ref=e379]
          - generic [ref=e382]:
            - heading "Frequently Asked Questions About Personal Injury Law" [level=2] [ref=e383]:
              - strong [ref=e384]: Frequently Asked Questions About Personal Injury Law
            - paragraph [ref=e385]: How long do I have to file a personal injury lawsuit in Missouri?
            - paragraph [ref=e386]: In most personal injury cases, you have 5 years from the date of the injury to file suit in Missouri. Across the state line in Illinois, you have 2 years.
            - paragraph [ref=e387]: "There are some exceptions:"
            - list [ref=e388]:
              - listitem [level=1] [ref=e389]: If the injury isn’t immediately apparent, the 5-year clock starts on the date the injury is discovered.
              - listitem [level=1] [ref=e390]: People injured as minors typically have 5 years or until their 21st birthday, whichever is later, to file a claim.
              - listitem [level=1] [ref=e391]: Claims against government entities, such as the City of St. Louis or Metro Transit, have dramatically shorter time frames — some as little as 90 days.
              - listitem [level=1] [ref=e392]: In a wrongful death suit, the family of the deceased has 3 years from the date of death to file a claim.
            - paragraph [ref=e393]: In all cases, the sooner you start your claim, the better. As time passes, evidence becomes lost or destroyed, witnesses move away, and memories fade. Meanwhile, the costs of your injury keep compounding.
            - heading [level=2] [ref=e394]
            - paragraph [ref=e395]: Can I still sue if my injury is partly my fault?
            - paragraph [ref=e396]: Yes. Missouri is a comparative fault state. If you were partly at fault for your injury, the amount of damages you’re awarded is reduced by the amount of your liability.
            - paragraph [ref=e397]: For example, if the court finds you were 25% responsible in a $100,000 claim, you may still recover $75,000.
            - paragraph [ref=e398]: Insurance companies will paint a picture that puts you at fault to lower the amount they have to pay. An experienced lawyer will get you the level of compensation you really deserve.
            - heading [level=2] [ref=e399]
            - paragraph [ref=e400]: How much does a personal injury lawyer cost in St. Louis?
            - paragraph [ref=e401]: Fernandez Law handles personal injury cases on a contingency fee basis. That means there are no fees or upfront costs when we’re hired.
            - paragraph [ref=e402]: Our fee is calculated as a percentage of the compensation you win. So if we don’t win your case, you don’t pay.
            - heading [level=2] [ref=e403]
            - paragraph [ref=e404]: How do I know if I have a personal injury case?
            - paragraph [ref=e405]: "You likely have a case if:"
            - list [ref=e406]:
              - listitem [level=1] [ref=e407]: You suffered a real, provable injury, whether physical, psychological, or financial;
              - listitem [level=1] [ref=e408]: The injury happened because someone else was negligent or reckless;
              - listitem [level=1] [ref=e409]: And you have measurable damages such as pain, lost wages, and medical bills.
            - paragraph [ref=e410]: The best way to know if you have a case is to consult with an attorney. The initial consultation is free, confidential, and no obligation.
            - heading [level=2] [ref=e411]
            - paragraph [ref=e412]: Do I need to hire a personal injury attorney?
            - paragraph [ref=e413]: Under Missouri law, you are not required to hire an attorney. You can file a personal injury claim yourself.
            - paragraph [ref=e414]: But people who hire an attorney recover far more money than those who handle claims on their own, even after paying legal fees.
            - paragraph [ref=e415]: Filing a claim and seeing it through involves complex paperwork, court procedures, and deadlines. You’ll be up against legal professionals who know more than you do about the system and whose job is to make sure you get as little as possible.
            - heading [level=2] [ref=e416]
            - paragraph [ref=e417]: How long does a personal injury case take?
            - paragraph [ref=e418]: Most personal injury cases settle in anywhere from a few months to a year. Cases that go to trial may take two years or more.
            - paragraph [ref=e419]: In most cases, you should not accept a settlement until your medical team can confidently predict your long-term outcomes. Settling too soon may mean running out of money for future medical needs.
            - heading [level=2] [ref=e420]
            - paragraph [ref=e421]: What should I do if an insurance company contacts me about my injury?
            - paragraph [ref=e422]: If an insurance representative contacts you, do not give them any recorded statement—even if they’re from your insurance company.
            - paragraph [ref=e423]: Do not give any statements, answer any questions, accept any offers, or sign any releases without first consulting an attorney.
            - paragraph [ref=e424]: Once you’ve hired an attorney, you can direct insurers to communicate only with your legal team.
            - heading [level=2] [ref=e425]
            - paragraph [ref=e426]: What if the other party doesn’t have enough insurance?
            - paragraph [ref=e427]: Insurance limits are a real concern, especially in catastrophic injuries, where long-term costs can far exceed the limits of any one policy.
            - paragraph [ref=e428]: Most large awards come from settling with multiple responsible parties. Fernandez Law works to identify every party that may bear some liability in the injury.
            - heading [level=2] [ref=e429]
            - paragraph [ref=e430]: What should I look for in a personal injury lawyer?
            - paragraph [ref=e431]: "Look for these factors when choosing a personal injury attorney to represent you:"
            - list [ref=e432]:
              - listitem [level=1] [ref=e433]: Experience in personal injury cases, particularly in the kind of injury you suffered
              - listitem [level=1] [ref=e434]: A track record of substantial settlements and verdicts
              - listitem [level=1] [ref=e435]: Trial experience and willingness to go to trial
              - listitem [level=1] [ref=e436]: Peer recognition such as ratings and awards
              - listitem [level=1] [ref=e437]: Open communication policies so your questions are always answered and you always know where your case stands
              - listitem [level=1] [ref=e438]: Positive client reviews
              - listitem [level=1] [ref=e439]: A contingency fee model, so they only get paid when you win
            - heading [level=2] [ref=e440]
            - heading "Your consultation is free. Time is limited. Don't wait." [level=2] [ref=e441]:
              - generic [ref=e442]: Your consultation is free. Time is limited. Don't wait.
            - paragraph [ref=e443]: If you or a loved one suffered a personal injury in the St. Louis area, you don’t have to face your recovery alone.
            - paragraph [ref=e444]: Gonzalo Fernandez and his team have been fighting for the rights of the injured for more than 30 years.
            - paragraph [ref=e445]: They’ll help you get the compensation you need to get your life back.
            - paragraph [ref=e446]:
              - strong [ref=e447]: Schedule a free, confidential, no-obligation consultation today.
