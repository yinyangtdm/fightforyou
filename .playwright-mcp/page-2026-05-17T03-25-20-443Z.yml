          - heading "New York Based, Nationally Known, Civil Rights and Personal Injury and General Practice Law Firm, Dedicated to Social Justice" [level=1] [ref=e72]
          - article [ref=e73]:
            - generic [ref=e76]:
              - paragraph [ref=e77]:
                - text: The Law Offices of Frederick K. Brewington is a well-respected litigation firm; with an office in Hempstead, Long Island. Our focus is primarily in the area of
                - link "civil rights" [ref=e78] [cursor=pointer]:
                  - /url: https://www.brewingtonlaw.com/civil-rights-new-york-attorneys-nassau-county-law-firm-hempstead
                - text: ", voting rights, employment discrimination,"
                - link "police misconduct" [ref=e79] [cursor=pointer]:
                  - /url: https://www.brewingtonlaw.com/police-misconduct-nassau-county-law-firm-new-york-attorneys-hempstead
                - text: ", personal injury,"
                - link "medical malpractice" [ref=e80] [cursor=pointer]:
                  - /url: https://www.brewingtonlaw.com/content/personal-injury-medical-malpractice-and-products-liability
                - text: ", wrongful death and criminal law. However, the Law Offices of Frederick K. Brewington is a full service law firm handling matters in numerous areas of law and providing a wide range of services from contract formation to litigation and trial practice. The Law Offices of Frederick K. Brewington has often been referred to as the \"Justice Posse.\" Their work and results support that designation."
              - paragraph [ref=e81]: The Law Offices of Frederick K. Brewington is unique in its own right. It is the largest African-American-owned law firm on Long Island and has been designated by the New York Law Journal as one of the top minority-owned firms in the state of New York. The Law Office, which opened its doors in New York City over 30 years ago, is built on the principles of service, advocacy, community consciousness, commitment, professionalism and skill. The success of the Firm is a direct result of the quality of the attorneys and their commitment to its clients. The Law Office adheres to the highest level of legal excellence and constantly strives to meet the expectations of its clients.
              - paragraph [ref=e82]: Clients not only select the Firm because of the unique qualifications of the attorneys practicing, but also because the Firm's attorneys are more than capable of representing their diverse set of needs. The Firm's attorneys have different backgrounds and experiences; they are effective at utilizing their special individual skill sets and knowledge to work together as a team to provide the best legal representation to its clients. As part of the work they do, Mr. Brewington's law firm serves to provide a voice to those that are under-represented and serves as a vehicle to seek justice for those that have been wronged. The Firm's commitment to ensure that justice is served is the driving force behind the positive results that come from the large number of cases that it handles on a monthly basis. The Law Offices of Frederick K. Brewington makes great efforts to always represent its clients zealously and ethically and strives to provide each client with individualized attention and care as well as provide excellent services from the initial consultation all the way through the disposition of the matter.
              - paragraph [ref=e83]:
                - text: We invite you to browse our website to learn more about our firm, our attorneys and our practice areas. If you have a potential or pending legal matter,
                - link "contact us" [ref=e84] [cursor=pointer]:
                  - /url: https://www.brewingtonlaw.com/contact-hempstead-new-york-law-firm-nassau-county
                - text: for additional information or to schedule a consultation. We look forward to speaking with you and welcome an opportunity to service your legal needs.
