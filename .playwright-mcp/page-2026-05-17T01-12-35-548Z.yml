              - heading "Demand for Chocolate Causes More Illegal Deforestation Than People Realize." [level=2] [ref=e69]
              - paragraph [ref=e70]:
                - text: “The Cocoa supply chain, much like a high-end bar of chocolate, is complex, opaque and a little nutty. Farmers, mainly in West Africa, sell their crop to local intermediaries, who in turn sell to exporters.
                - link "Read More" [ref=e71] [cursor=pointer]:
                  - /url: /wp-content/uploads/sites/1302542/2023/06/Cocoa-Deforestation.pdf
              - heading "Nestle Still Can’t Defeat Child, Slave Labor Claims, Judge Told" [level=2] [ref=e72]
              - paragraph [ref=e73]:
                - text: “This is Nestlé USA, Inc.’s fifth bite at the apple — repeating the same arguments that this court already rejected. For all the reasons its prior pleading challenges failed, this attempt fails too,” the proposed class said.
                - link "Read More" [ref=e74] [cursor=pointer]:
                  - /url: /wp-content/uploads/sites/1302542/2022/10/Nestle-Article-Law360-10_20_22DEL.pdf
              - heading "Recent Victory In Human Rights Case" [level=2] [ref=e75]
              - paragraph [ref=e76]: 9/6/22 – Today the Eleventh Circuit Court of Appeals held that families suing Chiquita Brands International for supporting the paramilitaries who murdered their loved ones in Columbia could continue toward their trials.
              - paragraph [ref=e77]: In a unanimous, 104 page opinion the Eleventh Circuit reversed a district court’s 2019 decision, which had held that the families had no admissible evidence that the paramilitary organization Chiquita has admitted to funding was responsible for the death of their loved ones. The Court of Appeals held that much of the evidence the Plaintiffs had relied on could be admitted against Chiquita in a trial, rejecting Chiquita’s many legal arguments to the contrary. The Court also held that a reasonable jury could find against Chiquita as to whether the paramilitary organization it funded killed plaintiffs’ loved ones.
              - paragraph [ref=e78]: The ruling is a significant victory for the families in the appeal and potentially for the thousands of other families also involved in the litigation, in which the appellants were bellwether plaintiffs. More, the appeal clarified the evidentiary standard for victims of mass atrocities and murders in this case and beyond.
              - paragraph [ref=e79]: SSHHZ’s Paul Hoffman argued on behalf of the families before the Eleventh Circuit with he and John Washington briefing the case along with co-counsel, including Earthrights International, Cohen Milstein Sellers & Toll PLLC; and Judith Brown Chomsky, Anthony DiCaprio, and Arturo Carrillo.
