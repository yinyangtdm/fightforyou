                - text: ", and the"
                - link "Cargill brief here" [ref=e129] [cursor=pointer]:
                  - /url: /wp-content/uploads/sites/1302542/2020/10/Cargill-Type-A-Final.pdf
                - text: .
              - heading "SSHHZ Law Files Petition For Restraining Order – Alleges Unlawful Use of Force By Sheriff’s Department At Protests" [level=2] [ref=e130]
              - paragraph [ref=e131]:
                - text: LEILA MILLER, Calif., Sept. 21, 2020 – Plaintiffs in a class-action lawsuit are seeking a temporary restraining order and injunction to limit the Los Angeles County Sheriff’s Department’s use of nonlethal force at protests, claiming it has employed rubber bullets, tear gas and other chemical agents indiscriminately against peaceful protestors, journalists and legal observers in violation of the Constitution.
                - link "Read more." [ref=e132] [cursor=pointer]:
                  - /url: /news/sshhz-law-files-petition-for-restraining-order-alleges-unlawful-use-of-force-by-sheriffs-department-at-protests/
              - heading "Federal Lawsuit Claims Yahoo Management’s Secret Pact With China Supported Torture, Imprisonment of Pro-Democracy Activists" [level=2] [ref=e133]
              - paragraph [ref=e134]:
                - text: "SAN JOSE, Calif., Sept. 2, 2020 – Attorneys for renowned Chinese activist Ning Xianhua have filed a federal lawsuit alleging that Yahoo Inc. founder Jerry Yang and CEO Terry Semel provided Mr. Ning’s Yahoo emails to Chinese authorities in a joint effort to silence pro-democracy dissidents in China and to aid Mr. Ning’s capture, imprisonment, and torture by Chinese government officials. Yahoo’s successor companies, Oath Holdings, a division of Verizon Communications Inc. (NYSE:"
                - link "VZ" [ref=e135] [cursor=pointer]:
                  - /url: https://www.prnewswire.com/news-releases/federal-lawsuit-claims-yahoo-managements-secret-pact-with-china-supported-torture-imprisonment-of-pro-democracy-activists-301123104.html#financial-modal
                - text: ") and Altaba Inc. (NASDAQ:"
                - link "AABA" [ref=e136] [cursor=pointer]:
                  - /url: https://www.prnewswire.com/news-releases/federal-lawsuit-claims-yahoo-managements-secret-pact-with-china-supported-torture-imprisonment-of-pro-democracy-activists-301123104.html#financial-modal
                - text: ) are also named as defendants in the case.
                - link "Read more." [ref=e137] [cursor=pointer]:
                  - /url: /news/federal-lawsuit-claims-yahoo-managements-secret-pact-with-china-supported-torture-imprisonment-of-pro-democracy-activists/
              - heading "United States District Court Northern District Of California San Jose Division" [level=2] [ref=e138]
              - paragraph [ref=e139]:
                - text: Plaintiff NING XIANHUA
                - strong [ref=e140]: (Mr. Ning),
                - text: "by and through his undersigned attorneys, complains and alleges the following:"
              - paragraph [ref=e141]:
                - strong [ref=e143]: INTRODUCTION
              - list [ref=e144]:
                - listitem [ref=e145]: In May of 1989, hundreds of thousands of Chinese students and workers gathered at Beijing’s Tiananmen Square to protest peacefully in favor of democracy and improved conditions for China’s working class. On June 4, 1989, China’s communist regime ordered the Chinese military to remove the protesters from Tiananmen Square and to execute or arrest those who refused. The military violently removed the protesters, killing thousands of them in the process by firing on them with assault rifles and running over them with armored vehicles.
              - paragraph [ref=e146]:
                - link "Read more" [ref=e147] [cursor=pointer]:
                  - /url: /wp-content/uploads/sites/1302542/2020/09/United-States-District-Court-Northern-District-Of-California-San-Jose-Division.pdf
              - heading "B.B. v. County of LA" [level=2] [ref=e148]
              - paragraph [ref=e149]:
                - strong [ref=e150]: "Important Victory for Victims’ Rights in California Supreme Court:"
                - text: Today in a unanimous ruling the California Supreme Court, in the case of B.B. v. County of Los Angeles, held a L.A. County Sheriff’s Deputy could not avoid full responsibility for a man’s death caused by his intentional use of force by pointing to the victim’s contributory negligence.
              - paragraph [ref=e151]: In 2015, a jury determined that a deputy had acted intentionally in using force which killed Darren Burley, an African-American father of five, and awarded the family $8,000,000 in damages. The Court of Appeal substantially reduced the award finding that it should be offset due to the negligent conduct of Mr. Burley. The California Supreme Court reversed and reinstated the entire verdict.
              - paragraph [ref=e152]:
                - link "Read more" [ref=e153] [cursor=pointer]:
                  - /url: /wp-content/uploads/sites/1302542/2020/08/SSHHZ_BBvLA_County_AUG20.pdf
              - heading "Black Lives Matters" [level=2] [ref=e154]
              - paragraph [ref=e155]: SSHHZ lawyers join other LA civil rights lawyers in Protecting the Rights of Protestors.
              - paragraph [ref=e156]: Paul Hoffman, Michael Seplow, Aidan McGlaze and John Washington are part of a team of LA civil rights lawyers in suing the LAPD for violating the rights of peaceful protestors during mass protests after the murder of George Floyd by Minneapolis police officers. The lawsuit seeks to prohibit the LAPD, among other things, from firing projectiles into crowds and from detaining protestors for hours in unventilated buses in tight handcuffs without any law enforcement justification.
              - heading "Chocolate Slave Labor Cases" [level=2] [ref=e157]
              - paragraph [ref=e158]: In a significant victory for plaintiffs, the U.S. District Court in Southern California denied Nestlé USA, Inc.’s anti-SLAPP motion, allowing a nationwide class action to move forward, alleging Nestle profiteers off misleading claims that its cocoa is “sustainably sourced,” while knowingly purchasing cocoa from a supply chain that relies on forced child and slave labor, and environmental degradation in West Africa.
