              - heading "Nestle Can’t Ditch Child Slave Labor Labeling Suit" [level=2] [ref=e97]
              - paragraph [ref=e98]:
                - text: Law360 (March 29, 2022, 9:19 PM EDT) — A California federal judge on Monday refused to toss a proposed class action accusing Nestlé USA of deceptively marketing its chocolate products as sustainably sourced despite getting cocoa from farms reliant on child slave labor.
                - link "Read More" [ref=e99] [cursor=pointer]:
                  - /url: /wp-content/uploads/sites/1302542/2022/03/Nestle-Cant-Ditch-Child-Slave-Labor-Labeling-Suit-Law360.pdf
              - heading "United States District Court Southern District Of California" [level=2] [ref=e100]
              - paragraph [ref=e101]:
                - text: Pending before the Court in this putative consumer class action alleging deceptive product labeling is Defendant’s motion to dismiss for failure to state a claim.
                - link "Read More" [ref=e102] [cursor=pointer]:
                  - /url: /wp-content/uploads/sites/1302542/2022/03/J-Lorenz-Order-denying-Nestle-MTD2.pdf
              - heading "CAOC’s 2021 Street Fighter of the Year Award" [level=2] [ref=e103]
              - paragraph [ref=e104]:
                - text: Attorney Mike Seplow been named a finalist for the California Attorneys of California’s (CAOC) 2021 Street Fighter of the Year award. This is one of the highest honors awarded by CAOC, and the recipients are small-firm attorneys who have advanced justice for plaintiffs through their work on a case that was finalized in the past year.
                - link "Read more" [ref=e105] [cursor=pointer]:
                  - /url: https://caoc-convention.com/awards
                - text: .
              - heading "2021 “California Lawyer Attorneys of the Year”" [level=2] [ref=e106]
              - paragraph [ref=e107]: Congratulations to attorney Mike Seplow, who has received the California Lawyer Attorney of the Year (CLAY) award by the Daily Journal. The CLAY awards honor a select few attorneys for achievements in the legal profession that have greatly impacted public policy, the law, or a particular practice area.
              - heading "Court Allows Lawsuit Alleging False Advertisement Of Sustainable Cocoa To Proceed" [level=2] [ref=e108]
              - paragraph [ref=e109]:
                - link "Class action" [ref=e110] [cursor=pointer]:
                  - /url: /wp-content/uploads/sites/1302542/2021/05/Order_Denying_Starbucks_MTD.pdf
                - text: alleges it misleads consumers with claims of sustainably sourced cocoa despite knowledge of child and slave labor.
              - paragraph [ref=e111]:
                - text: San Diego, Calif. (May 6, 2021) – In a significant victory for consumers, the U.S. District Court in the Central District of California denied a company’s attempts to dismiss plaintiff’s claims, allowing a nationwide class action to move forward. The lawsuit alleges that one of the world’s largest companies profiteers off misleading claims that its cocoa is “sustainably sourced,” while knowingly purchasing cocoa from a system that relies on forced child and slave labor in West Africa.
                - link "Read more." [ref=e112] [cursor=pointer]:
                  - /url: /news/court-allows-lawsuit-against-starbucks-alleging-false-advertisement-of-ethical-cocoa-to-proceed/
              - heading "Tekoh V. County of Los Angeles" [level=2] [ref=e113]
              - paragraph [ref=e114]: In an appeal brought by SSHHZ and the Offices of John Burton, the Ninth Circuit held for the first time that police officers who cause statements they elicit without the necessary Miranda warnings to be used to criminally prosecute the speaker violate the Fifth Amendment and the officers are liable for damages under civil rights law, regardless of whether they engaged in any other kinds of coercion.
              - paragraph [ref=e115]: The case involves a plaintiff who was given no Miranda warnings, and asked to sign a false confession. After he did so, he was prosecuted, and ultimately acquitted. He sued the officers for violating his Fifth Amendment rights. The district court found that he could not pursue a claim based on the officers’ failure to Mirandize him unless they engaged in other coercion, and the Ninth Circuit reversed the district court, holding for the first time that these lawsuits are available throughout those states in the Ninth Circuit.
              - paragraph [ref=e116]:
                - text: See the Ninth Circuit’s opinion
                - link "here" [ref=e117] [cursor=pointer]:
                  - /url: /wp-content/uploads/sites/1302542/2021/01/TekohOpn.pdf
                - text: ", and the oral argument in the case"
                - link "here." [ref=e118] [cursor=pointer]:
                  - /url: https://youtu.be/rvb041AKzpQ
              - heading "SSHHZ’s Paul Hoffman, Renowned Human Rights And Civil Rights Litigator, Argued Nestle USA v. Doe I And Cargill v." [level=2] [ref=e119]
              - paragraph [ref=e120]:
                - text: "Doe I – consolidated cases alleging big chocolate knowingly profits from aiding and abetting child slave labor in West Africa – at the Supreme Court. Listen here:"
                - link "https://www.c-span.org/video/?477430-1/alien-tort-statute-consolidated-arguments" [ref=e121] [cursor=pointer]:
                  - /url: https://www.c-span.org/video/?477430-1/alien-tort-statute-consolidated-arguments
              - heading "SSHHZ Files Its Supreme Court Briefs In Doe v. Nestle And Cargill." [level=2] [ref=e122]
              - paragraph [ref=e123]:
                - text: SSHHZ filed briefs in its cases in the U.S. Supreme Court against
                - link "Nestle" [ref=e124] [cursor=pointer]:
                  - /url: /wp-content/uploads/sites/1302542/2020/10/Nestle-Revised-Final-Type-A.pdf
                - text: and
                - link "Cargill" [ref=e125] [cursor=pointer]:
                  - /url: /wp-content/uploads/sites/1302542/2020/10/Cargill-Type-A-Final.pdf
                - text: under the Alien Tort Statute. The agricultural giants argue that corporations cannot be liable for aiding and abetting child slavery – only human beings can – even though international law has forbidden slavery since the 19th century. They also argue that they could not be liable for aiding and abetting the enslavement of foreign children. SSHHZ disagrees, and seeks to hold them accountable on behalf of a class of former child slaves trafficked into the Ivory Coast and who have been pursuing justice against the companies since 2005.
              - paragraph [ref=e126]: SSHHZ partner Paul Hoffman will argue the case before the Court on December 1. The briefs were written with Terrence Collingsworth of International Rights Advocates, and Catherine Sweetser of UCLA School of Law, co-counsel on the case, and with the UCI and UCLA School of Law clinics.
              - paragraph [ref=e127]:
                - text: You can find the
                - link "Nestle brief here" [ref=e128] [cursor=pointer]:
