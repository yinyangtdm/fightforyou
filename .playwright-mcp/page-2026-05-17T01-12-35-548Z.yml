              - paragraph [ref=e84]:
                - text: By
                - link "Tim Carman" [ref=e85] [cursor=pointer]:
                  - /url: https://urldefense.com/v3/__https:/www.washingtonpost.com/people/tim-carman/__;!!GFN0sa3rsbfR8OLyAw!ZaQZfTLHvLA_ilJO2gXgAR6OunYZxOr86eUy8p24cvbTHpbudNy4O-kjzr9jrj09tAeuo7F6pWR4N-sbWH7Pjc022Sr_0A%24
              - paragraph [ref=e86]: July 19, 2022 at 2:49 p.m. EDT
              - paragraph [ref=e87]: Organic Valley’s labeling is the subject of a lawsuit over animal welfare. (Lisa M. Bolton/The Washington Post)
              - paragraph [ref=e88]:
                - text: On one panel of Organic Valley’s whole milk carton, the dairy cooperative says its “commitment to the highest organic standards and animal care practices helps make all our food delicious and nutritious.” Rotate the carton 90 degrees, and another panel tells consumers that Organic Valley believes “the best organic milk begins with . . . taking care of our cows,” relying on “humane” and “holistic health” practices.
