              - heading "SSHHZ & Colleagues’ Lawsuit Leads to Release of Long-Sealed Testimony in Roman Polanski Case" [level=2] [ref=e90]
              - paragraph [ref=e91]:
                - text: "July 18, 2022: Today several media outlets released testimony from the criminal trial of Roman Polanski in which the prosecutor in the case extensively discussed alleged misconduct in the case, including by the judge, whom the prosecutor sought to disqualify. The transcripts had remained sealed from public review for twelve years despite numerous prior attempts and motions to unseal them."
                - link "Read More" [ref=e92] [cursor=pointer]:
