            - generic [ref=e499]:
              - 'heading "We are trial lawyers. Our philosophy is simple: We put our heart and soul into every case we take, and we do everything in our power to achieve the best possible result for our clients." [level=5] [ref=e500]'
              - paragraph [ref=e501]: What sets us apart from other civil rights attorneys is the small number of cases we accept and our willingness to go all the way to trial. We will never allow ourselves to be overburdened by a large caseload. We purposefully take only a few select cases each year, so that every client receives the proper respect and personal attention that he or she deserves.
              - paragraph [ref=e502]:
                - strong [ref=e503]: We handle civil rights cases involving catastrophic personal injuries and wrongful death.
                - text: We focus on cases involving egregious instances of jail or prison abuse or neglect resulting in death or serious injury. We also take select police misconduct cases involving police brutality, excessive force, and in-custody deaths.
              - paragraph [ref=e504]:
                - strong [ref=e505]: Budge & Heipt has the skills and resources to go toe-to-toe with anyone.
                - text: Time and again, we have successfully taken on the government, the police, public and private jails, state prisons, and large correctional corporations.
            - generic [ref=e506]:
              - paragraph [ref=e507]:
                - strong [ref=e508]: Budge & Heipt is based in Seattle, but we take federal civil rights cases around the country
                - text: . We have handled cases in the federal district courts of Washington, Alaska, Oregon, Hawaii, Nevada, Colorado, Texas, Ohio, Wisconsin, Tennessee, Arkansas, Arizona and Indiana, and we routinely review cases in other states as well.
              - paragraph [ref=e509]:
                - strong [ref=e510]: Our track record speaks for itself
                - text: . Since the firm was founded in 1998, we have obtained a total of more than $180 million in jury verdicts and settlements, including some of the largest jury verdicts and settlements in the United States for victims of civil rights violations. We have achieved record-setting results for jail wrongful death and excessive force cases in several jurisdictions, including Washington, Texas, Wisconsin, Oregon, Arkansas and Indiana. Our litigation success is directly related to hard work and a passion for what we do.
              - paragraph [ref=e511]: If your civil rights have been violated or if you would like to discuss a case involving significant injuries or the death of a loved one, we are interested in speaking with you.
              - paragraph [ref=e512]:
                - text: Please
                - link "contact our law office" [ref=e513] [cursor=pointer]:
                  - /url: /contact-us/
                - text: for a free consultation.
