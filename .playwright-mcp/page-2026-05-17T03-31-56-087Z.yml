            - paragraph [ref=e114]: Led by partners Terry Gilbert, Marcus Sidoti, Sarah Gelsomino, Al Gerhardstein, and Jacqueline Greene, our combined experience and team approach make us well-suited to represent clients fighting back against civil rights violations and wrongdoing by the government, police, and jail officials.
            - paragraph [ref=e115]: We fiercely represent people facing criminal charges, from misdemeanors to felonies in state and federal court. In addition, we handle post-conviction motions and appeals following convictions or pleas in criminal cases.
