                - generic:
                  - paragraph:
                    - strong: Starting in 1945
                    - text: The Stritmatter name first appeared in our law firm in 1945 after Lester Stritmatter returned from his US Navy military service during WWII and joined Warner Poyhonen in the Hoquiam general practice law firm of Poyhonen and Stritmatter. In 1950 Poyhonen became a Grays Harbor County Superior Court Judge and Lester Stritmatter carried on as a sole practitioner.
