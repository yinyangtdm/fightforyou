                - paragraph [ref=e54]: Our team includes 16 practicing personal injury attorneys and a large professional support staff in our offices in Seattle and Hoquiam, Washington. We fight hard because we care about our clients. We will not give up even when the defendants and their insurance companies try to overwhelm us. We believe the civil justice system helps to balance the playing field between a victim and large corporations or the government. We uphold the sanctity of the constitutional right to trial by jury.
