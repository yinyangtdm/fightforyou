        - heading "Here When You Need Us Most" [level=2] [ref=e119]
        - paragraph [ref=e120]: At Stroud, Flechas & Dalton, we recognize that by the time you contact one of our lawyers, you are almost certainly in crisis. You could be struggling to recover from a serious injury caused by someone else’s negligence, or you may have been charged with a criminal offense that has left you desperately scrambling to save your reputation and your future. During such a low point in your life, every single minute is critical, and you should not wait to get legal advice.
        - paragraph [ref=e121]:
          - text: Our team makes it our mission to provide small-firm dedication while delivering large-firm results. That means the nimble size of our team allows us to dedicate ourselves fully to every single person we represent. At the same time, we have the skills, resources, and experience to deliver the same competitive results as larger law firms. Having recovered millions for our clients,
