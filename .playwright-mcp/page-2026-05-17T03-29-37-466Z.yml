    - generic [ref=e229]:
      - heading "Work with a Leading Workers’ & Civil Rights Law Firm in Northern New England" [level=2] [ref=e234]:
        - text: Work with a Leading Workers’ & Civil Rights
        - text: Law Firm in Northern New England
      - generic [ref=e235]:
        - generic [ref=e236]:
          - paragraph [ref=e237]: Our attorneys have been hailed as leaders in their fields, ranging from employment and labor law to professional liability, government overreach and other Section 1983 cases, class actions, and more.
          - paragraph [ref=e238]:
            - text: Our team puts their proven trial skills on your side; our lawyers have achieved
            - strong [ref=e239]: precedent-setting jury verdicts, court rulings, and class action results
            - text: . Attorneys
            - link "Phillip Johnson" [ref=e240] [cursor=pointer]:
              - /url: /about-us/phillip-e-johnson/
            - text: and
            - link "David Webbert" [ref=e241] [cursor=pointer]:
              - /url: /about-us/david-g-webbert/
            - text: have been named in
            - strong [ref=e242]: The Best Lawyers in America©
            - text: ", one of the legal profession’s oldest and most respected peer-reviewed publications. Attorney Webbert has also been recognized five times as one of the"
            - strong [ref=e243]: Top 100
            - emphasis [ref=e244]:
              - strong [ref=e245]: Super Lawyers
            - strong [ref=e246]: in New England
            - text: .
          - paragraph [ref=e247]: Our team’s qualifications include Mr. Johnson’s regular service as a consultant to other law firms on ethics matters, as an expert witness in state and federal court on legal malpractice matters, and Mr. Webbert’s awards from the Maine Civil Liberties Union and the Disability Rights Center of Maine. Mr. Webbert is also an elected member of the American Law Institute, a group of leading judges, legal scholars, and lawyers, founded to promote clarity and reform in judge-made law and recognized as one of the most prestigious American legal associations.
        - generic [ref=e248]:
          - paragraph [ref=e249]: If you need a lawyer to prosecute claims for violations of (1) employment rights, such as discrimination based on unlawful factors such as age, sex, sexual orientation (which includes gender identity and expression), physical or mental disability, religion, race, color, ancestry, or national origin; wrongful termination; hostile work environment or harassment; whistleblower retaliation; or wage theft; or (2) civil rights, such as police misconduct or brutality, abuse of process, prisoners’ rights violations, or false arrest, violations of consumer rights, free speech violations, or other misconduct by government officials, we can help.
          - paragraph [ref=e250]: Our team has handled all types of employment and civil rights claims, including highly complicated class actions. We also represent labor unions and their members, those in the aviation industry, professionals in the medical and legal fields regarding licensing and employment issues, and those who have suffered serious personal injuries or lost loved ones in wrongful death accidents.
          - paragraph [ref=e251]: We understand the stress, financial strain, and emotional impact on you, your family, your career, and your reputation in these legal disputes. Your first step in these cases is to seek the advice of a knowledgeable attorney about where you stand and the best path for favorably resolving your situation. Our team offers highly respected legal guidance and proven advocacy in these matters.
          - paragraph [ref=e252]:
            - strong [ref=e253]: Call us at
            - link "(207) 618-6682" [ref=e254]:
              - /url: tel:(207) 618-6682
              - strong [ref=e255]: (207) 618-6682
            - strong [ref=e256]: to schedule a consultation today.
