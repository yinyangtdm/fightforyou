              - heading "Waiting Too Long to Contact Us Could Lead to Your Case Being Dismissed in Court" [level=2] [ref=e1057]
              - generic [ref=e1059]:
                - paragraph [ref=e1060]:
                  - text: If you or someone you love was injured in an accident, it is important to contact a personal injury attorney as soon as possible.
                  - link "The New York statute of limitations" [ref=e1061] [cursor=pointer]:
                    - /url: /faqs/new-york-personal-injury-statute-of-limitations/
                  - text: requires that most personal injury lawsuits be filed within
                  - link "three years" [ref=e1062] [cursor=pointer]:
                    - /url: https://www.nysenate.gov/legislation/laws/CVP/214
                  - text: from the date of injury or
                  - link "two years" [ref=e1063] [cursor=pointer]:
                    - /url: https://www.nysenate.gov/legislation/laws/EPT/5-4.1
                  - text: from the date of death. These deadlines are strictly enforced. If you file after they pass, you will most likely lose your chance to pursue compensation for your injuries and losses.
                - paragraph [ref=e1064]: To build the strongest claim possible, we will need time to prepare your case ahead of the filing deadline. Further, the sooner you reach out to us, the sooner we can start gathering evidence before it is tampered with or disappears altogether.
            - img "New York accident attorneys, Alex Nocerino and Sameer Chopra fist bumping" [ref=e1068]
            - generic [ref=e1069]:
              - heading "GET STARTED ON YOUR NEW YORK CITY AND WEST NASSAU PERSONAL INJURY CASE BY CALLING ON CHOPRA & NOCERINO" [level=2] [ref=e1072]
              - generic [ref=e1074]:
                - paragraph [ref=e1075]:
                  - text: Our New York personal injury and accident law firm provides
                  - link "free, no-obligation consultations" [ref=e1076] [cursor=pointer]:
                    - /url: /contact/
                  - text: . During your consultation, we will ask questions about your accident, give you an idea of what your case may be worth, and make sure you know your full legal rights and options. This will also be your opportunity to ask your own questions about your case and our services.
                - paragraph [ref=e1077]: "To prepare for this meeting, you should bring all the evidence you’ve been able to gather on your own. This may include things like:"
              - list [ref=e1081]:
