              - generic [ref=e1137]:
                - paragraph [ref=e1138]: If you decide to move forward with our Garden City law firm, we will deal with insurance companies and even help you manage your medical care if needed. We charge nothing upfront, and you will never pay us anything unless we win your case.
                - paragraph [ref=e1139]: If you have been injured in an accident in the five boroughs due to someone else’s carelessness, you deserve justice, accountability, and compensation. Our hard-working injury attorneys in the Greater New York Region are here to help injury victims throughout our community.
                - paragraph [ref=e1140]: Our playing field is the courtroom, and we have what it takes to hit a home run at the settlement table and in front of a jury. Contact us today to schedule your free consultation with an experienced, knowledgeable, and compassionate New York personal injury attorney. To better serve our community, we offer services in English and in Spanish.
