              - heading "We Are Real Deal New Yorkers Who Will Step Up to the Plate for You When You Need Us Most" [level=2] [ref=e891]
              - generic [ref=e893]:
                - paragraph [ref=e894]: When you suffer serious injuries in an accident, you get one chance to fight for the financial compensation you deserve. Insurance companies will use every trick in the book to avoid compensating you fairly. They have in-house teams of defense lawyers who represent their interests. Their goal? Preventing you from getting the full and fair compensation you are entitled to and pocketing the rest.
                - paragraph [ref=e895]: You can level the playing field by working with our all-star team of injury attorneys in Garden City, NY. When you work with us, you can rest assured that your case is in capable hands. Our compassionate and supportive personal injury lawyers will hit whatever curveball the insurance company handling your claim throws our way.
                - paragraph [ref=e896]: "We understand that dealing with the ins and outs of a lawsuit is probably the last thing you want to do as you recover from your injuries. Let our Garden City law firm handle everything for you. Among other things, our services include:"
                - list [ref=e897]:
                  - listitem [ref=e898]:
                    - strong [ref=e899]: Conducting a thorough investigation of your accident to find out who is liable.
                  - listitem [ref=e900]:
                    - strong [ref=e901]: Gathering all available evidence before it disappears or deteriorates.
                  - listitem [ref=e902]:
                    - strong [ref=e903]: Handling all correspondence with insurers so you can focus on your recovery and family.
                  - listitem [ref=e904]:
                    - strong [ref=e905]: Work hard to prove that you were not at fault for the accident if the insurance company tries to pin the blame on you.
                  - listitem [ref=e906]:
                    - strong [ref=e907]: Reviewing your medical records and calculating your full and fair compensation.
                  - listitem [ref=e908]:
                    - strong [ref=e909]: Working with experts, such as doctors, accident reconstruction specialists, and forensic analysts, to substantiate your claim.
                  - listitem [ref=e910]:
                    - strong [ref=e911]: Negotiating a settlement or taking your case to trial if the insurance company refuses to pay what you deserve.
                  - listitem [ref=e912]:
                    - strong [ref=e913]: Negotiating with your medical providers to reduce your medical bills and keep your money where it belongs, in your pocket.
