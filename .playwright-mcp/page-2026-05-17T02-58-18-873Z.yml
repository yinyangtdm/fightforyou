        - paragraph [ref=e30]: ArchCity Defenders (ACD) is a holistic legal advocacy organization that combats the criminalization of poverty and state violence, especially in communities of color. ACD’s foundation of civil and criminal legal representation, social services, impact litigation, policy and media advocacy, and community collaboration achieves and inspires justice and equitable outcomes for people throughout the St. Louis region and beyond.
