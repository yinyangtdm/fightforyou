                    - paragraph [ref=e109]: Settlement Comes After Attorneys Uncovered Damning Evidence of a Frame-up That Put an Innocent Man Behind Bars for 33 Years (BALDWIN PARK, CA) The City of Baldwin Park has agreed to pay $19.1 million to settle a wrongful conviction lawsuit brought by exoneree Daniel Saldaña, the national civil rights firm Neufeld Scheck Brustin Hoffmann & Freudenberger, LLP announced today. At age 22, Saldaña was just starting out his life when he was wrongfully convicted of charges relating to a 1989 attempted murder. His nightmare began when a Baldwin Park Police Department (BPPD) detective framed him for the drive-by shooting. Saldaña steadfastly maintained his innocence until he was exonerated in 2023 at age 55. “Mr. Saldaña’s wrongful conviction resulted from the egregious misconduct of a Baldwin Park detective who systematically fabricated evidence and pressured witnesses throughout a fundamentally flawed investigation,” said NSBHF partner Amelia Green. “While no amount of money can
