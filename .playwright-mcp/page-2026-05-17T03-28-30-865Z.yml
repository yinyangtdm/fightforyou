          - paragraph [ref=e101]: We pursue every available path to justice, including civil rights, constitutional claims, personal injury, and discrimination law, so our clients are fully protected. By combining individual cases with systemic discovery, we uncover patterns of neglect, trace them to financial decisions, and force reforms that extend beyond one case.
