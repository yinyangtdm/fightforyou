                - heading "Fighting for the Compensation You Deserve" [level=3] [ref=e295]
                - generic [ref=e297]:
                  - paragraph [ref=e298]: A serious injury or violation of your rights can leave you facing numerous unexpected challenges. From exorbitant medical bills to lost wages and income to debilitating physical pain and/or emotional trauma, these challenges can make it incredibly difficult to move forward with your life.
                  - paragraph [ref=e299]: Personal injury law stems from the old common-sense notion that a person who carelessly harms someone else has an obligation to restore that person to their standing before the injury. Since it is impossible to undue the injury, the wrongdoer must make payment sufficient to compensate the victim for any losses or suffering. Civil rights law applies that same concept to the harm that comes from having your equal rights or right to due process trampled.
              - figure [ref=e300]:
                - img "Sanford Rubenstein Addressing Press" [ref=e301]
            - generic [ref=e302]:
              - paragraph [ref=e308]:
                - text: In all types of civil litigation, our New York City attorneys are dedicated to helping our clients secure the full, fair compensation they are owed. We do not settle claims for less than they are worth; when the other side refuses to play fair, our experienced trial lawyers are ready to take them on in court. We do not give up on our clients or their recoveries—and we believe this shows in our
                - emphasis [ref=e309]:
