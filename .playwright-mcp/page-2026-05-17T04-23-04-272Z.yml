                - generic [ref=e69]:
                  - heading "Serving Victims Throughout New York" [level=2] [ref=e70]
                  - paragraph [ref=e71]: Navigating any legal matter can be incredibly challenging. Most people are unsure of how to proceed or where to turn, but with Rubenstein & Rynecki by your side, you can have confidence knowing that a team of experienced legal professionals is fighting for you and your best interests. Whether you have been injured in an accident, were wrongfully terminated from your job, had your civil rights violated, or believe your loved one’s death was the result of a doctor’s negligence, you deserve justice.
                - generic [ref=e73]:
                  - heading "Fierce Representation for the Injured—Right Here in Brooklyn" [level=2] [ref=e74]
                  - paragraph [ref=e75]: If you’ve been seriously injured in an accident, the road ahead can feel overwhelming. At Rubenstein & Rynecki, our Brooklyn-based attorneys are here to guide you through the process with strength, compassion, and decades of experience. We represent individuals and families across Brooklyn and the surrounding areas who have suffered harm due to car accidents, construction accidents, medical negligence, truck accidents, and more.
                  - paragraph [ref=e76]: With roots in Brooklyn dating back to 1972 and officially established in 1996, our firm has built a strong legacy of standing up for victims in their most challenging moments. We’re proud to serve our community with a commitment to accessibility, open communication, and relentless advocacy. We don’t believe in one-size-fits-all solutions—our legal guidance is always tailored to your specific circumstances.
                  - paragraph [ref=e77]: Let us help you seek the justice you deserve after an accident in Brooklyn.
                  - paragraph [ref=e78]:
                    - strong [ref=e79]:
                      - text: Need help with a legal matter?
