        - generic [ref=e106]:
          - heading "Chaloupka Law" [level=2] [ref=e109]
          - paragraph [ref=e112]: Chaloupka Law founder Maren Lynn Chaloupka has built a reputation on her willingness and ability to take on – and win – extraordinarily challenging cases, no matter how complex the legal barriers involved might seem.
          - paragraph [ref=e115]: Maren’s experience and skill as a trial lawyer, along with her compassion for her clients and her commitment to doing what’s right, has made her one of the most recognized, respected, and successful litigation attorneys in the Midwest.
          - paragraph [ref=e118]: Based in the Nebraska Panhandle, Maren is a voice and an advocate for clients across 34 Nebraska counties and nine states whose lives have been irrevocably changed due to negligence or abuse by another person, government, corporation, or other difficult adversary. She has tried 70 cases in state and federal courts. At the same time, Maren has handled 82 civil and criminal appeals in state and federal appellate courts – all in just 25 years of law practice.
