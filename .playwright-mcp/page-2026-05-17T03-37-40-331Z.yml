            - heading "The “Beatrice 6” Civil Rights Victory" [level=2] [ref=e190]
            - generic [ref=e192]:
              - paragraph [ref=e193]: Maren was co-lead counsel for six wrongfully-convicted men and women, known at the “Beatrice 6.” What started as a cold case investigation of a 1985 rape and murder ultimately led to the imprisonment of six innocent people in Gage County.
              - paragraph [ref=e194]: They spent a combined 76 years behind bars until DNA proved their innocence. The same DNA testing proved that the crime was committed by a single perpetrator unrelated to any of the Beatrice 6.
              - paragraph [ref=e195]: Along with her co-counsel, Maren’s steadfast and strategic litigation work over the course of a decade led to a jury awarding $28.1 million in damages to the six plaintiffs in the civil lawsuit.
            - link "ARTICLE HERE" [ref=e196] [cursor=pointer]:
