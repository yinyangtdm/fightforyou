        - generic [ref=e153]: The ACLU of Louisiana's Immigrant Rights Project (IRP) aims to work with community partners to document and expose the realities of immigration detention in Louisiana by creating partnerships among directly-impacted people, private in-house counsel and/or law firms, and law school clinics, to harness their talent and resources and provide pro bono relief in the form of parole application assistance, habeas petitions, and Civil Rights and Civil Liberty complaints (“CRCL”).
