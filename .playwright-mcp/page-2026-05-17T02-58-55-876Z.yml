            - paragraph [ref=e87]: At the Zaytoun Law Firm, we provide exceptional legal services to people harmed by negligence and wrongdoing, as well as to a wide range of physicians and medical practices involved in business, non-compete, or regulatory issues. Located in Wilmington, NC, our dedicated, compassionate, and experienced attorneys focus exclusively in civil litigation and trial advocacy in all Federal and State courts in North Carolina.
            - paragraph [ref=e90]: Chances are you heard about our firm from a friend, family member or another lawyer. There's a reason for that—we don't advertise. We believe in the value of personal relationships, and our client relationships are built on our reputation with the public and other attorneys for getting successful results. We handle only a select number of cases and maintain a small enough case load to deliver outstanding legal services and close personal attention to every client we represent.
