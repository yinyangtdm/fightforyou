              - paragraph [ref=e170]: The 7th Amendment guarantees your right to a trial by jury. A trial is your access to the civil justice system and allows you to hold wrongdoers accountable when they harm people, either intentionally or through negligence. If such lawbreakers are not held accountable, it erodes your safety and the safety of our community.
              - paragraph [ref=e171]: At Popham Injury Law of Kansas City, our personal injury attorneys are completely dedicated to protecting the rights of individuals and holding lawbreakers accountable. Whether you have suffered a serious injury or have been wrongfully terminated, we can help. In addition to our work representing individuals in Kansas and Missouri, we provide mediation services for our fellow attorneys.
