    - region "Practice areas" [ref=e154]:
      - article [ref=e156]:
        - heading "Queens Personal Injury Lawyers Serving the Injured Since 1981" [level=2] [ref=e157]
        - paragraph [ref=e158]: When you or a loved one has been seriously injured due to someone else's negligence, the attorney you choose matters. The Orlow Firm has been a trusted name in Queens personal injury law for over four decades, representing injured New Yorkers across all five boroughs. From our offices in Queens, Brooklyn, the Bronx, and Manhattan, we handle every aspect of your claim so you can focus on recovery — not paperwork, insurance adjusters, or medical bills.
        - paragraph [ref=e159]: Our firm is led by attorneys whose commitment to the Queens community extends well beyond the courtroom. Adam Orlow served as President of the Queens County Bar Association in 2022–2023, and Steven Orlow — a Cornell Law graduate and former NYC Council Member-At-Large — served as QCBA President in 2008–2009. That level of civic leadership reflects the same dedication we bring to each client's case. All three of our attorneys are active members of the New York State Bar Association, the New York State Trial Lawyers Association, the Brandeis Association, and the Queens County Bar Association. We understand the neighborhoods, the courts, the insurance companies, and the challenges that injured people in Queens face every day — because this is where we've built our careers and our reputation.
        - paragraph [ref=e160]: "As experienced Queens personal injury lawyers, we represent clients hurt in car accidents, construction accidents, slip and falls, lead poisoning cases, workers' compensation claims, police misconduct, nursing home abuse, and sexual abuse. No matter how complex the case, our approach remains the same: thorough advocacy, honest communication, and a commitment to pursuing the best possible outcome for every client."
        - paragraph [ref=e161]: If you're searching for a personal injury lawyer in Queens who will take the time to understand your situation and fight to pursue the compensation you may be owed, we're here. Consultations are free, and you pay nothing unless we win your case.
