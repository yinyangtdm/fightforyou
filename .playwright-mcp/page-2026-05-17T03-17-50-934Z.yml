          - generic [ref=e230]:
            - paragraph [ref=e231]:
              - text: When we say "Good People, Great Lawyers," we mean it. Not only is BHPK widely considered one of the top litigation firms in Greater Boston and Massachusetts –
              - emphasis [ref=e232]: featuring award-winning, preeminent trial attorneys whose settlement and litigation results speak for themselves
              - text: "– but there’s another distinguishing reason for our unprecedented success rate over the past three decades: we care about the results that we achieve for our clients as much as they do."
            - paragraph [ref=e233]: When you come to BHPK, you will be represented by attorneys who genuinely listen, value your situation, and will do whatever it takes to deliver exemplary results. Our attorneys are former Boston prosecutors, public servants, and seasoned litigators. In addition, BHPK offers a host of other services to our clients in the form of experienced legal trainers, investigators, employment and municipal advisors, and strategists. We also have a deep tradition of public service and giving back to the Boston and Massachusetts communities, setting us apart from our peers.
            - paragraph [ref=e234]: We combine our extensive legal experience as Boston employment, civil rights, municipal, and insurance defense attorneys with our real world knowledge in these areas to explore a practical approach to our cases. We also routinely handle claims on behalf of aggrieved individuals in the areas of sexual harassment, discrimination, and sexual assault, and have a unique understanding of what it takes to navigate these sensitive cases.
            - paragraph [ref=e235]: We invite you to get to know us, and to learn more about our history of excellence and reputation as one of the top trial and litigation teams in Boston and in the state of Massachusetts.
