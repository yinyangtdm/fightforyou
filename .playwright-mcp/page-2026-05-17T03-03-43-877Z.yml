            - heading "IT TAKES A WOLF" [level=3] [ref=e560]
            - paragraph [ref=e561]: The lawyers at Storms Dworak are a rare breed of attorney. They are all law school honors graduates who are as tough as they are smart. Our lawyers are regularly recognized for their victories inside and outside the courtroom, including perennial ratings by Super Lawyers and six collective Attorney of the Year awards from Minnesota Lawyer. They have helped clients recover millions of dollars in matters involving sexual assault, civil rights violations, medical malpractice, car crashes, employment, and business disputes.
            - paragraph [ref=e562]: The firm adopted the wolf as a nod to its Northern roots and because our lawyers strive to embrace the wolf’s best traits, including intelligence, intuition, and loyalty. We fiercely advocate for our clients and are not afraid to take calculated risks through litigation strategy or by taking cases other lawyers deem too challenging to pursue. We stand by your side at the most challenging of times and show you the path towards accountability, be it for the loss of a loved one, infringement of your constitutional rights, the loss of employment, or when you suffer injury or abuse so serious that your life will be forever impacted.
            - paragraph [ref=e563]: Storms Dworak has attorneys licensed in Minnesota, South Dakota, and various federal courts throughout the Midwest.
            - link "Contact Us" [ref=e564] [cursor=pointer]:
              - /url: https://www.stormsdworak.com/contact/
