    - generic [ref=e40]:
      - generic [ref=e41]:
        - heading "Civil Rights Attorney" [level=4] [ref=e42]
        - heading "DALE K. GALIPO" [level=1] [ref=e43]
        - paragraph [ref=e44]: Dale K. Galipo is the founder and principal of The Law Offices of Dale K. Galipo, in Woodland Hills, California. Originally from a suburb of Cleveland, Ohio, he graduated from The University of Michigan, Ann Arbor, with a degree in business administration and obtained his J.D. from the UCLA School of Law in 1984.
        - paragraph [ref=e45]: With a highly successful trial record in both criminal defense and personal injury law throughout the 90’s, Mr. Galipo was dubbed “The Strikes Man” by the Daily Journal Los Angeles for multiple jury acquittals in “three strikes” cases. From 1995 through 1996, he obtained six consecutive jury acquittals on major felony cases, and continuing to prove his trial abilities, he soon obtained multimillion dollar jury verdicts in personal injury cases.
        - paragraph [ref=e46]: Mr. Galipo focused his trial skills on civil rights cases involving police misconduct and by 2004, was achieving seven-figure jury verdicts for victims of excessive force and police abuse. In 2011 he won ten civil rights cases in a single year! In 2012 he was awarded the Defender of the Constitution Award by the Inland Empire Chapter of the Federal Bar Association and later was the Honoree for the Martin Luther King award, presented in his name at the UC Davis School of Law. In 2020, he was awarded the coveted CAALA Trial Lawyer of the Year award and in the same year, received the prestigious CAOC Consumer Attorney of the Year award! In 2023 and 2024, he was named among The Daily Journal’s Top Plaintiff’s Lawyers and in 2024 he was a finalist for the CAOC Attorney of the Year award and a top 15 finalist for CAALA Trial Lawyer of the Year. Later that same year, he was honored with a CLAY award by The Daily Journal’s California Lawyers Magazine.
        - paragraph [ref=e47]: Mr. Galipo has been selected to the Southern California’s Super Lawyers list for the past thirteen years running. He is an esteemed member of The Inner Circle of Advocates and a proud Fellow of The American College of Trial Lawyers. Mr. Galipo has prevailed in over 100 Jury Trials with more than 100 seven-figure verdicts and settlements and twenty published opinions on civil rights.
        - paragraph [ref=e48]: Dale Galipo is widely considered to be one of the top civil rights trial attorneys in the country.
        - blockquote [ref=e49]:
          - heading "Someone Has To Police The Police" [level=2] [ref=e50]:
            - emphasis [ref=e51]: Someone Has To Police The Police
      - img "Dale K. Galipo, Los Angeles Civil Rights Attorney" [ref=e53]
