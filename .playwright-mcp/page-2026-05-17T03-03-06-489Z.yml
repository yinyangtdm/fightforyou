            - strong [ref=e72]: Dedicated Attorneys Serving Fayetteville, Fort Bragg, and North Carolina
          - paragraph [ref=e73]: The attorneys at The Richardson Firm have over 75 years of combined experience in the civil and criminal courts of North Carolina. Our law firm is locally owned, and our attorneys have deep roots in Fayetteville and Cumberland County. We’re proud to provide honest and high-quality representation to the people that make this community great.
          - paragraph [ref=e74]: The legal system in North Carolina is complex, intimidating, and constantly changing. Whether you’ve suffered serious personal injury or medical malpractice, you’re in a divorce or custody dispute, or you’ve been charged with a criminal or traffic offense in state or federal court, we stand ready to help! Put our reputation, skill, and experience on your side. We would be honored to fight for you.
          - paragraph [ref=e75]: If you need an attorney or have questions about our services, please give us a call or fill out the contact form at the bottom of this page.
