    - generic [ref=e84]:
      - heading "Our Roots" [level=2] [ref=e85]
      - paragraph [ref=e86]:
        - text: Walton + Brown LLP was founded by childhood friends Sean L. Walton and Chanda L. Brown. Over the years, Sean and Chanda followed parallel paths in their education and careers.
        - text: Sean and Chanda both have strong service-oriented backgrounds and both found themselves working in personal injury law and civil rights law where they could fight for victims of tragedies and discrimination.
        - text: In 2014, Sean and Chanda decided to join their individual efforts into a partnership and the idea for Walton + Brown, LLP was formed.
      - link "Read More" [ref=e87] [cursor=pointer]:
        - /url: /expertise
    - generic [ref=e95]:
      - heading "Our Mission" [level=2] [ref=e96]
      - paragraph [ref=e97]: At Walton + Brown, LLP, our mission is to deliver exceptional legal representation backed by a proven record of success. We pride ourselves on securing substantial settlements and verdicts for our clients, driven by a deep expertise in litigating serious and catastrophic injury cases, as well as police misconduct and employment discrimination cases. Founded by Chanda and Sean, our firm embodies a fresh, client-focused approach—combining innovative strategies with an aggressive approach to resolving cases—to ensure justice is served.
      - link "Read More" [ref=e98] [cursor=pointer]:
        - /url: /expertise
    - generic [ref=e102]:
      - heading "Our Record" [level=2] [ref=e103]
      - paragraph [ref=e104]: With a record of over 500 lawsuits and more than $42 million secured in settlements and verdicts, the attorneys at Walton + Brown deliver proven results for our clients. Our expertise spans a broad range of serious personal injury cases—including auto, trucking, bus, and motorcycle accidents, wrongful death claims, and other incidents where someone’s negligence has caused harm. Our firm is also dedicated to securing justice for individuals affected by police misconduct and employment discrimination.
      - link "Read More" [ref=e105] [cursor=pointer]:
        - /url: /expertise
