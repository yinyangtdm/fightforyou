        - generic [ref=e75]:
          - text: A graduate with honors from Indiana University Robert H. McKinney School of Law, Josiah launched his career working under Solicitor General Thomas M. Fisher. During this time, Josiah wrote briefs for multiple cases litigated before the Supreme Court of the United States (including matters that advanced to oral argument) and advised the Indiana Attorney General on strategic multi-state litigation. His exceptional performance led to his appointment as Deputy Attorney General, where he served with distinction.
          - paragraph
          - generic [ref=e76]:
            - text: Josiah’s practice area spans successful complex regulatory investigations of insurance companies to securing safety for the target of a terrorist organization. Swinney has secured six-figure judgments for clients and protected businesses facing allegations of securities fraud. Josiah also secured an outright dismissal of a murder charge. Josiah Swinney has a track record of fighting for his clients and achieving outstanding results.*
