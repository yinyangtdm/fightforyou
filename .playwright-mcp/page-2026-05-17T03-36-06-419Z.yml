              - text: As a seasoned criminal defense lawyer, she has represented private clients in high-stakes criminal jury trials and complex civil matters. She now focuses her practice on major felony trial work, Section 1983 civil rights litigation, and vigorously defending clients against unconstitutional government actions. Karen is highly respected for her aggressive courtroom presence, successful trial wins, and expertise in dismissing cases under the Fourth Amendment’s protection from unreasonable searches and seizures — skills built over decades as both a former prosecutor and accomplished criminal attorney. When Karen joined Josiah Swinney in 2025 to restart her full-time criminal defense practice, multiple
