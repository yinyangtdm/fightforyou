    - generic [ref=e255]:
      - generic [ref=e256]:
        - heading "Your Questions Answered" [level=2] [ref=e257]
        - paragraph [ref=e259]: For more than two decades, our firm has been helping injured individuals and their families fight for the justice and fair recovery they are owed. When someone elseвҖҷs careless, reckless, or negligent actions result in injuries or the death of your loved one, you have the right to take legal action. Our Indiana personal injury attorneys are here to help.
      - generic [ref=e260]:
        - generic [ref=e261] [cursor=pointer]:
          - generic [ref=e262]:
            - img [ref=e264]
            - heading "How Much Is My Personal Injury Case Worth?" [level=3] [ref=e267]
          - paragraph [ref=e268]: Your attorney can speak with you about this, but even attorneys canвҖҷt necessarily pinpoint what your case is worth until it is close to a resolution. Many factorsвҖ”including the circumstances of the accident, the state of the drivers involved, and the insurance companiesвҖ”influence the outcome. So do your medical bills, your loss of income, and the nature of your injuries. An experienced lawyer can work with you to decide whether to pursue legal action and how to proceed.
        - generic [ref=e269] [cursor=pointer]:
          - generic [ref=e270]:
            - img [ref=e272]
            - heading "Do I Have to Go to Court If I Want to Recover Damages?" [level=3] [ref=e275]
          - paragraph [ref=e276]: Maybe. Your case may settle even before your attorney files a lawsuit; on the other hand, it may go all the way to a trial and a jury verdict. The majority of lawsuits are settled before they get to trial, but what happens in your case depends on the facts, the law, and the parties involved.
        - generic [ref=e277] [cursor=pointer]:
          - generic [ref=e278]:
            - img [ref=e280]
            - heading "How Long Do I Have to File a Personal Injury Lawsuit?" [level=3] [ref=e283]
          - paragraph [ref=e284]: The statute of limitations refers to the need to file a lawsuit within a time limit. In Indiana, most injury cases have a two-year statute of limitationsвҖ”but not all. Some lawsuits, such as lawsuits against the government, require a notice within a shorter period of time. The time begins to run when a cause of action accrues. A good example is someone negligently running into your car. The statute of limitation begins on the day of the accident. Sometimes, however, you have no way of knowing that you have a cause of action for years, such as discovering ill effects from taking a medication or being exposed to chemicals. It is important to seek the advice of an attorney and doctor if you suspect that you are having problems but donвҖҷt know for sure if it relates to the negligence of another or an unreasonably dangerous product.
        - generic [ref=e285] [cursor=pointer]:
          - generic [ref=e286]:
            - img [ref=e288]
            - heading "Can I Talk to You About My Case for Free?" [level=3] [ref=e291]
          - paragraph [ref=e292]: Absolutely. Our personal injury lawyers in Indianapolis are more than happy to talk with people about their case without charging a fee for the consultation. Even if it is a case that we are not able to take for some reason, we can often make suggestions about what the caller can do or refer them to other legal resources that may be able to provide assistance.
        - generic [ref=e293] [cursor=pointer]:
          - generic [ref=e294]:
            - img [ref=e296]
            - heading "What Am I Entitled to Recover After an Accident?" [level=3] [ref=e299]
          - paragraph [ref=e300]: You may be entitled to a number of different types of damages under Indiana law. Some of the more common types of damages in accident cases include reasonable and necessary medical expenses, lost earnings, reduced earning capacity in the future, future medical expenses and prescriptions, pain and suffering, and permanent impairment.
        - generic [ref=e301] [cursor=pointer]:
          - generic [ref=e302]:
            - img [ref=e304]
            - heading "How Much Will I Have to Pay for You to Handle My Case?" [level=3] [ref=e307]
          - paragraph [ref=e308]: Like most personal injury law firms, our fee is taken as a percentage of the recovery that is made and paid at the time of settlement. If a lawsuit is filed on your behalf, the percentage usually increases, due to the increased amount of work required in prosecuting the lawsuit. However, if we are unable to recover money for you, you do not pay us anything. The actual fee charged in your case will depend on the circumstances of our case and can range anywhere from 20-40%.
        - generic [ref=e309] [cursor=pointer]:
          - generic [ref=e310]:
            - img [ref=e312]
            - heading "What If IвҖҷve Already Hired Another Attorney?" [level=3] [ref=e315]
          - paragraph [ref=e316]: If you already hired another attorney to handle your personal injury case and you are not happy with their services, the first thing you should do is try to work through the problems with that attorney. Lack of communication, disagreement over the amount of a potential settlement, and lack of attention to your case are the reasons we most frequently hear as to why clients are unhappy with their current attorneys. However, it is very important to be comfortable and confident with your attorney. If you have tried but failed to work things out, you have the right to switch attorneys. Your prior attorney may assert a вҖңlienвҖқ for attorney fees and expenses incurred on your case, but our firm policy is to pay that lien out of our attorney fee if you switch attorneys. In other words, you have the right to switch attorneys and it will not cost you anything to do so.
