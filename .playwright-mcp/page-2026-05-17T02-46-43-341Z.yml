    - generic [ref=e48]:
      - heading "Who we Are" [level=1] [ref=e49]
      - separator [ref=e50]
      - paragraph [ref=e51]: The Bizer Law Firm fights for the rights of all Americans. We concentrate on increasing access for persons with disabilities and minority groups through litigation. We are also experienced in handling personal injury and insurance cases. Since founding the firm in New Orleans in 2008, we have developed a national presence with local partnerships in several states. We provide, free of charge, American Sign Language Interpreters for ALL our Deaf & Hard of Hearing Clients.
    - generic [ref=e54]:
      - generic [ref=e55]:
        - img [ref=e56]
        - heading "CIVIL RIGHTS" [level=3] [ref=e57]
        - separator [ref=e58]
        - paragraph [ref=e59]: The Bizer Law Firm is one of a small number of Louisiana law firms that concentrate on enforcing the rights of individuals with disabilities under the Americans with Disabilities Act of 1990 (ADA), the Rehabilitation Act of 1973, and the Fair Housing Act. The Bizer Law Firm is committed to ensuring that individuals with disabilities receive equal access to public and private facilities and services.
      - generic [ref=e60]:
        - img [ref=e61]
        - heading "PERSONAL INJURY" [level=3] [ref=e62]
        - separator [ref=e63]
        - paragraph [ref=e64]: At The Bizer Law Firm, we have extensive experience litigating personal injury cases in state and federal court. We handle personal injury cases involving motor vehicle collision, trucking accidents, premises liability, and others.
    - generic [ref=e66]:
      - heading "Andrew Bizer" [level=1] [ref=e67]
      - separator [ref=e68]
      - img [ref=e70]
      - paragraph [ref=e71]: Andrew Bizer has been fighting for the disabled and injured for over 20 years. He has successfully litigated over 500 cases under the Americans with Disabilities Act. Andrew prides himself on his close relationship with all of his clients. Andrew graduated from Brooklyn Law School in 2004 and Tulane University in 1997. He is admitted to practice law in both Louisiana and New York.
