            - generic [ref=e56]:
              - heading "Protecting Workers’ Rights" [level=1] [ref=e59]
              - generic [ref=e61]: At Formisano & Company, our attorney advocates for workers in protected classes who have been harassed, discriminated against and retaliated against at work. He and our staff also help employees who have been wrongfully terminated throughout Rhode Island and southeastern Massachusetts.
              - button "CONTACT US" [ref=e63] [cursor=pointer]
            - generic [ref=e68]:
              - text: Advocating For Mistreated Workers
              - strong [ref=e69]:
                - emphasis [ref=e70]: In Rhode Island
            - generic [ref=e73]:
              - heading "A Dedicated Voice For Employees" [level=2] [ref=e76]:
                - text: A Dedicated Voice
                - emphasis [ref=e77]: For Employees
              - generic [ref=e79]:
                - paragraph [ref=e80]: Your job is an essential part of your life and is crucial for the support of your family. That is why it can be so frustrating and devastating when your employer or co-workers foster an unsafe or disrespectful working environment. If you want to hold your employer accountable, then it is critical that you have experienced and skilled legal representation.
                - paragraph [ref=e81]: At Formisano & Company, our founding lawyer is not only knowledgeable, but he’s also recognized in the employment law arena for his accomplishments. Attorney V. Edward Formisano is AV Preeminent peer-review rated,* the highest rating, through Martindale-Hubbell.
                - paragraph [ref=e82]: At our firm, he stands up for workers facing disputes related to employment contracts, severance agreements and workplace injustices throughout Rhode Island and southeastern Massachusetts. Let attorney Formisano amplify your voice.
              - paragraph [ref=e85]: "*AV®, AV Preeminent®, Martindale-Hubbell Distinguished and Martindale-Hubbell Notable are certification marks used under license in accordance with the Martindale-Hubbell certification procedures, standards and policies. Martindale-Hubbell® is the facilitator of a peer-review rating process. Ratings reflect the anonymous opinions of members of the bar and the judiciary. Martindale-Hubbell® Peer Review Ratings™ fall into two categories – legal ability and general ethical standards."
