                - emphasis [ref=e142]: And Insightful Representation
              - generic [ref=e144]:
                - paragraph [ref=e145]: No part of your identity, including race, age, color, gender or faith, should ever be grounds for unfair treatment by your employer or colleagues. If you experience any form of discrimination, sexual harassment, retaliation or illegal action, you have the right to take a stand. Similarly, the law offers protection for federal or state employees who act as whistleblowers.
                - paragraph [ref=e146]: At Formisano & Company, you can expect strong and dedicated support. Our lawyer is a trusted resource in the legal community, with a reputation for handling even the most complex cases in state and federal courts, including those involving Fortune 50 and Fortune 500 companies and municipalities. With years of negotiation and trial experience, he is well-equipped to stand up for your rights and assist you in seeking justice.
            - generic [ref=e149]:
              - heading "Put A Proven Legal Advocate In Your Corner" [level=2] [ref=e152]:
                - text: Put A Proven Legal Advocate
                - emphasis [ref=e153]: In Your Corner
              - generic [ref=e155]:
                - paragraph [ref=e156]: Our attorney and staff recognize how complex workplace dynamics and unfamiliarity with the law may be putting you in a difficult position. Not everyone is brave enough to take on their employer – but you are, and our team wants to help.
                - paragraph [ref=e157]: Our lawyer is committed to providing the diligent and effective legal support that clients expect and deserve. His track record of winning millions of dollars in verdicts and settlements is proof of his tireless commitment to our clients.
                - paragraph [ref=e158]: Make informed decisions for your situation with timely and tailored guidance from our capable legal advocate. Mr. Formisano knows how to get justice and will stand up for you in court, if necessary, to pursue the outcome you deserve.
