            - strong [ref=e111]: Police Misconduct Lawyers in Boston, Massachusetts
          - paragraph [ref=e112]:
            - strong [ref=e115]: The Law Offices of Howard Friedman brings civil lawsuits on behalf of victims of police brutality, false arrest, wrongful death, and other civil rights violations.
          - paragraph [ref=e116]:
            - text: We believe that those who enforce the law should follow the law – and be held accountable when they do not.
            - strong [ref=e117]: If you've been a victim of police brutality or police misconduct then contact the Law Offices of Howard Friedman right now at (617) 742-4100.
          - paragraph [ref=e118]: Our police brutality and misconduct lawyers file lawsuits to obtain compensation for our clients, many of whose lives have been permanently altered by the injuries they suffered at the hands of the police. We also strive to bring about positive changes in the way that police departments and other government agencies operate.
          - paragraph [ref=e120]: Police and government abuse takes many forms and claims many different types of victims. Our firm has successfully handled cases involving police brutality, police misconduct, false arrest, wrongful conviction, First Amendment violations, illegal strip searches, discrimination, and inhumane treatment of prisoners.
          - paragraph [ref=e121]: Our clients come from all walks of life and represent diverse races, ages, occupations, levels of income and education, and political views. The unifying theme in our work is our commitment to vindicating the principles of the Constitution and to fighting official abuses of power.
