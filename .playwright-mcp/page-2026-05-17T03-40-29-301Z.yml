            - text: “Hillary Carls has been extremely generous with her knowledge and time. This has meant a lot to us. When you find yourself in unknown territory and in need of an attorney, it can be pretty scary. Hillary graciously assisted and pointed us in the right direction. We will always be grateful for her willingness to talk with us on several occasions “pro-bono”. She is a very caring person who wants to help do the right thing. She has ideals and moral standards that go beyond just getting clients and beating opponents. She actually wants to help resolve situations in a reasonable and healthy way. She is smart and knows what she is doing. I highly respect Hillary Carls and would recommend her as an attorney”. —
