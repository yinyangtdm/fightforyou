        - generic [ref=e55]:
          - paragraph [ref=e56]: Hillary P. Carls is a Bozeman trial attorney and the founder of Carls Law, PLLC, a Montana litigation firm dedicated to representing individuals and families in their most critical legal battles. With two decades of experience in Montana state and federal courts, Hillary has built a reputation as one of Montana’s most tenacious advocates — known for meticulous preparation, aggressive courtroom strategy, and a proven track record of results for her clients.
          - paragraph [ref=e57]:
            - text: Hillary focuses her practice on high-stakes civil litigation throughout Montana, serving as a serious injury attorney, wrongful death lawyer, and civil rights advocate for clients facing life-altering circumstances. She represents individuals in cases involving
            - link "catastrophic personal injuries, wrongful death, traumatic brain injuries and concussions, police misconduct and civil rights violations, wrongful incarceration, gender discrimination, motor vehicle collisions, premises liability, and insurance disputes" [ref=e58] [cursor=pointer]:
              - /url: /practiceareas
            - text: . She is a fierce advocate who takes cases to trial when that is what it takes to secure justice for her clients.
          - paragraph [ref=e59]:
            - text: Hillary’s commitment to justice is exemplified by her work as a wrongful conviction attorney in
            - emphasis [ref=e60]: Raugust v. Sanders County
            - text: ", in which she represented Richard Raugust, a man who spent eighteen years wrongfully imprisoned for a homicide he did not commit after a deputy sheriff withheld exculpatory evidence critical to his defense. Hillary to ultimately obtain a $5 million settlement against Sanders County and the responsible officer for the violation of her client’s constitutional rights. The case stands as one of the largest wrongful incarceration settlements in Montana history."
          - paragraph [ref=e61]: Hillary Carls is admitted to practice before the Montana Supreme Court, the United States District Court for the District of Montana, and the United States Court of Appeals for the Ninth Circuit. Before founding her Bozeman law firm, she honed her litigation skills as a partner at several prominent Montana firms, including Angel, Coil & Bartlett; Dodd, Blackford & Carls, P.C.; and Blackford Carls, P.C. Early in her career, she served as a judicial law clerk to the Honorable Chief Judge Robert Coats of the Alaska Court of Appeals — an experience that gave her invaluable insight into judicial decision-making and appellate strategy.
          - paragraph [ref=e62]: Hillary earned her Juris Doctor and a Certificate in Environmental and Natural Resources Law from the Northwestern School of Law at Lewis & Clark College in Portland, Oregon, in 2005. During law school, she served as an Associate Editor of Environmental Law, the law school’s prestigious law review, and was honored with the Cornelius Honor Society Award. She holds a B.A. in Business from Montana State University in Bozeman (2001), where she was a four-year varsity golfer for the Bobcats and earned all-conference honors in the Big Sky Conference.
          - paragraph [ref=e63]: Hillary is an active leader in Montana’s legal community. She currently serves as President of the Montana Trial Lawyers Association and as a State Delegate to the American Association for Justice. She is a member of the Montana Bar Association, the Gallatin County Bar Association, the Montana Trial Lawyers Association, and the American Association for Justice.
          - paragraph [ref=e64]: Hillary currently serves on the boards of directors of the Montana Trial Lawyers Association, Bridger Bowl, and the Bridger Bowl Foundation, and on the board of alumni for Lewis & Clark Law School. She has previously served on the boards of the Montana Ballet Company, Keystone Conservation, and Bridger Care, Inc.
          - paragraph [ref=e65]: When she is not advocating for her clients in Montana courtrooms, Hillary enjoys skiing Bridger Bowl, hiking the trails of southwest Montana, and floating the Yellowstone River with her husband and son.
          - paragraph [ref=e66]: If you are looking for an experienced Bozeman personal injury lawyer, a wrongful death attorney, or a civil rights advocate in Montana, Hillary P. Carls is ready to fight for you and to fight for justice. Contact Carls Law, PLLC today to discuss your case.
        - img "Hillary P. Carls, Bozeman Montana trial attorney and founder of Carls Law, PLLC" [ref=e74]
