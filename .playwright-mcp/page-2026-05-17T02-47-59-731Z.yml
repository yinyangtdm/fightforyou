        - text: is more than just a lawyer, he's a husband and father who genuinely cares about the people he represents because he knows what it's like to walk in their shoes.
      - paragraph [ref=e121]:
        - img "Tom and Kiki" [ref=e122]
      - generic [ref=e123]:
        - paragraph [ref=e124]: No parent should ever have to watch their child suffer, but that's exactly what Tom and his family had to endure when his 12-year-old daughter, Kiki, was hit by a car while she was riding her bicycle. Kiki has had to undergo multiple surgeries as a result of her accident and continues to fight to regain her quality of life today.
        - paragraph [ref=e125]: To say Tom understands what accident victims are going through would be an understatement. That's why when he represents clients in personal injury cases, he considers it his duty and responsibility to fight for what they need to overcome adversity. Tom is caring, compassionate, sincere, and approachable ─ but when it's time to advocate for his clients, his Midwestern grit shows through.
        - generic [ref=e126]: A Cleveland native dedicated to his hometown
        - paragraph [ref=e127]: Growing up in Cleveland, Tom always wanted to make a difference in his hometown. Now, people in Cleveland and throughout Ohio who have been wronged turn to Merriman Legal to make things right.
        - paragraph [ref=e128]: Tom and his amazing team share the same goals and values. Together, they strive to make a positive impact in people’s lives by fighting for justice and delivering real results. Give yourself an edge and discover what Tom’s team can do for you.
    - img "Merriman Legal, LLC" [ref=e130]
