  - article [ref=e42]:
    - heading "Personal Injury Lawyers Winning for Cleveland" [level=1] [ref=e43]
    - heading "When you’ve been hurt in an accident, get Tom Merriman on your side" [level=2] [ref=e44]
    - paragraph [ref=e45]:
      - text: When you’ve been injured in a crash that wasn’t your fault, you need someone in your corner who you know you can trust to advocate for your best interests. You’re in the right place, because that’s exactly what the Cleveland
      - link "car accident" [ref=e46] [cursor=pointer]:
        - /url: https://www.teamlgm.com/auto-accidents
      - text: lawyers from Merriman Legal take pride in doing.
    - paragraph [ref=e47]:
      - text: Our attorneys are personable, compassionate, and dedicated to getting injured clients the best possible outcome for their case through smart and aggressive representation. If you’ve been wronged, our law firm can make things right. Make my team your team.
      - link "Contact us" [ref=e48] [cursor=pointer]:
        - /url: https://www.teamlgm.com/contact
      - text: today for a free consultation.
    - generic [ref=e49]: We understand what you're going through
    - paragraph [ref=e50]: When you’ve been hurt in a car crash, it can feel like the odds are stacked against you. We understand – you’re in pain, you can’t work, and you’ve got piles of unpaid medical bills.
    - paragraph [ref=e51]: At Merriman Legal, LLC, our Cleveland car accident attorneys vigorously fight to protect the rights of the injured because we truly care what happens to our clients. We know when you put your trust in our law firm, you’re counting on us to make sure we advocate for your health, wellbeing, and financial future. It’s not a responsibility any of us takes lightly, and that’s why so many people in Cleveland and throughout Ohio hire our lawyers to represent them. They know we’ll fight for them with passion and persistence.
    - generic [ref=e52]: See what my team can do for you
    - paragraph [ref=e53]: When you hire Merriman Legal, LLC, you’ll see first-hand the dedication our lawyers have to providing personal attention and a high level of commitment to each and every client. You shouldn’t expect anything less when you’re going through difficult times, and that’s what you’ll get with our law firm. You won’t get treated like a number here.
    - paragraph [ref=e54]:
      - text: Located in Cleveland, our attorneys have extensive experience handling a wide variety of personal injury cases throughout Ohio. When you need help following a car accident or another type of
      - link "personal injury claim" [ref=e55] [cursor=pointer]:
        - /url: https://www.teamlgm.com/personal-injury
      - text: ", our knowledgeable legal team knows what it takes to get you the compensation you need and deserve."
