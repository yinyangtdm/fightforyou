      - generic [ref=e243]:
        - heading "From the Supreme Court to small claims court, we pursue justice for you" [level=2] [ref=e244]
        - heading "Oklahoma Personal Injury Statute of Limitations" [level=3] [ref=e245]:
          - generic [ref=e246]: Oklahoma Personal Injury Statute of Limitations
        - paragraph [ref=e247]: If you have been seriously injured in an accident, it is important to understand how Oklahoma law may affect your case. According to Oklahoma code for civil procedure, you have two years from the date of the incident that caused your injury to file a lawsuit against the responsible party. This two year window makes it extremely important that you contact an attorney as soon as possible. If you wait until the deadline it may be too late.
      - generic [ref=e248]:
        - heading "Can I Afford a Personal Injury Attorney?" [level=3] [ref=e249]
        - paragraph [ref=e250]:
          - text: One of the biggest caveats we hear in our business is, “I’d like legal help… but I can’t afford it.” We like to say that you can’t afford not to have a personal injury attorney. At Bryan & Terrill Law, we offer our legal services on a contingency-fee basis. This means we only charge for our services if we win a settlement on your behalf.
          - text: We also provide a free initial consultation to all our clients. This gives us an opportunity to hear your story and provide you with some free legal advice. If you or a loved one has been seriously injured in Oklahoma,
          - link "contact us" [ref=e251] [cursor=pointer]:
            - /url: /contact-us/
          - text: today.
