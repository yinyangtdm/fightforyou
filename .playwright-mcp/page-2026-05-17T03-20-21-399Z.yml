            - strong [ref=e189]: "\"Another big plus is the staff there are always right there when you need them.\""
            - paragraph [ref=e191]: Ron handled my car crash case when the insurance company tried to blame ME even though I was rear-ended sitting a red light. I retained Ron Wright and we sued the other driver. I didn’t have any stress during the lawsuit because Ron would explain each step from talking to witnesses and what experts we would hire. Another big plus is the staff there are always right there when you need them. I got a great settlement in the end and the whole way I felt like I had someone fighting for me.
            - strong [ref=e193]: "- Stephanie G."
        - listitem [ref=e194]:
