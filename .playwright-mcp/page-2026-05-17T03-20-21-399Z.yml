            - strong [ref=e161]: "\"I never had to chase them down for updates.\""
            - paragraph [ref=e163]: From the first phone call, the team at Horn Wright made me feel like I mattered. Mr. Wright was honest and dilligent handling my case. He was upfront about timelines and what to expect and I appreciated the straight talk. What surprised me was how responsive they were. I never had to chase them down for updates. They made sure everything was handled right. If you’re on the fence with who to hire you give them a call and you’ll see pretty quickly.
