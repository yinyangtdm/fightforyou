            - strong [ref=e175]: "\"I’m very pleased with how they handled everything.\""
            - paragraph [ref=e177]: Mr. Wright was excellent throughout the process. Always kept me informed and explained things clearly. I’m very pleased with how they handled everything and wouldn’t hesitate to use them again or recommend them to a friend or family member.
            - strong [ref=e179]: "- Mack W."
