              - listitem [ref=e202]
            - strong [ref=e203]: "\"The whole team made me feel like I wasn’t alone.\""
            - paragraph [ref=e205]: I was injured pretty bad after slipping on a walkway that was covered outside a business that didn’t clear anything off. The owner tried to denying that they were at fault, but Ron didn’t let that fly. He was calm but persistent. I appreciated how he explained things clearly without being pushy. The whole team made me feel like I wasn’t alone in it. In the end, we reached a great settlement and I felt heard.
            - strong [ref=e207]: "- Melinda O."
        - listitem [ref=e208]:
