            - strong [ref=e217]: "\"They did everything they said they would from the start.\""
            - paragraph [ref=e219]: The team at Horn Wright went above and beyond on my injury case than what I expected. Ron always took the time to explain everything in my injury case and make sure I didn’t get taken advantage of. The staff there that worked on my case always followed up and would update whenever things changed on my case. They did everything they said they would from the start. Great firm to work with.
            - strong [ref=e221]: "- Anonymous"
