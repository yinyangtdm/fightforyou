              - heading "We Fight To Give You The Results You Deserve" [level=2] [ref=e155]
              - generic [ref=e157]:
                - paragraph [ref=e158]: If you have been injured by someone else’s negligence, are facing a business dispute or have been charged with a criminal offense, you need a law firm that will fight for your rights every step of the way. At HPS Law Firm, we take pride in providing individuals and businesses in Sioux Falls and throughout South Dakota with the best results possible in every case we handle through our experienced and aggressive representation.
                - paragraph [ref=e159]: Our firm’s focus is personal injury, and we handle all types of cases under that category, from a simple car accident to a complex wrongful death. Having handled hundreds of personal injury matters and obtained millions of dollars in compensation for our clients, our seasoned attorneys understand what you are going through and will use their considerable litigation experience to obtain every dollar you are entitled to under the law.
