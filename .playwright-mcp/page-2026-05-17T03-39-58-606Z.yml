            - generic [ref=e318]:
              - heading "Litigation Is Our Business" [level=2] [ref=e321]
              - paragraph [ref=e324]: In addition to personal injury matters, our attorneys have significant experience handling a wide variety of issues, including business disputes, Native American law, criminal law matters, civil rights, appeals, and trust and estate disputes. At HPS Law Firm, we focus exclusively on litigation. Unlike many other attorneys, who will quickly seek an out-of-court settlement that may not be in your best interests, our experienced attorneys are litigators first and are not afraid to take your case to trial if necessary. From the moment you retain our services, we will prepare your case as though it were going to trial. If we are unable to reach a favorable settlement, we will aggressively defend your rights in court and fight hard to secure the best possible outcome for you.
