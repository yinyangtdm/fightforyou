                  - /url: https://www.littlejohn-law.com/practice-areas/
              - generic [ref=e98]:
                - generic [ref=e99]: Law enforcement play a vital role in keeping its residents safe. Unfortunately, in carrying out this task, some law enforcement officers overstep the boundaries of what is legal. When law enforcement officers break the law and abuse their duty to protect, they should be held accountable for their actions
                - paragraph [ref=e101]: At the Charlotte office of Littlejohn Law, PLLC we advocate for victims of police brutality, false arrest, and other civil rights violations. If you have been the victim of any civil rights violation, we can help you file a lawsuit against a City and Town police department or County Sheriff’s Office in order to recover compensation for physical suffering, mental suffering, loss of wages, medical bills and more.
              - link "FIND OUT MORE" [ref=e103] [cursor=pointer]:
                - /url: https://www.littlejohn-law.com/practice-areas/
            - img "web-PoliceMisconduct" [ref=e107]
