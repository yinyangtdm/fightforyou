              - paragraph [ref=e85]: Littlejohn Law assists employees with all aspects of employment litigation, including claims for wrongful termination, harassment, and discrimination based on an individual’s race, gender, disability, religion, and national origin. Our firm also has experience with negotiating severances and assisting with workplace accommodations.
              - link "FIND OUT MORE" [ref=e87] [cursor=pointer]:
