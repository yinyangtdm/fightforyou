                  - /url: https://www.littlejohn-law.com/practice-areas/
              - paragraph [ref=e123]: We are all afforded fundamental civil rights and equality under the law. Our laws provide a constitutional guarantee against violations of the right to life and liberty. Some of these rights include the right to be free from police misconduct and discriminatory practices in both housing and education. If you believe your rights have been violated, Littlejohn Law stands ready to be a strong advocate who will protect and enforce the rights of our clients.
              - link "FIND OUT MORE" [ref=e125] [cursor=pointer]:
