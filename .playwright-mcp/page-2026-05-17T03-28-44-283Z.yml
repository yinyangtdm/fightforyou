            - heading "PASSIONATE, PERSONALIZED, AND PURPOSE DRIVEN LAWYERS" [level=4] [ref=e59]
            - paragraph [ref=e60]: At Littlejohn Law, PLLC, we remain dedicated to our unwavering mission to provide strong legal advocacy throughout the state of North Carolina.
