                - paragraph [ref=e276]: Prisoner abuse is when a prisoner is under arrest or incarcerated but is being mistreated. This may involve physical abuse, sexual abuse as well as torture. Under the eighth amendment, prison officials have a duty to ensure that prisoners are protected by refraining from excessive force.
