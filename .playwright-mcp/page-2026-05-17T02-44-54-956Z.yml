                - paragraph [ref=e209]: UNDERSTANDING WRONGFUL DEATH AS A PERSONAL INJURY CLAIM Wrongful death is a cause of action that exists on behalf of the next of kin to the decedent who died as a result of negligence. The heirs who are entitled to a claim for wrongful death include the spouse, the children, and the parents of the decedent. Wrongful death is intended to compensate the heirs for the loss of comfort, care, companionship, monetary support, emotional care, and guidance. “Loss of comfort” legally refers to the relationship, affection, rearing, and guidance that a child will not be able to receive from a ...
