    - generic [ref=e184]:
      - generic [ref=e185]:
        - strong [ref=e186]: "Dear Visitors to the Coxwell & Associates, PLLC, website:"
        - paragraph [ref=e187]:
          - text: I want to thank you for clicking and visiting this page. We have always been interested in helping people who are less fortunate. For 11 years we hosted a social event at Christmas to collect toys for children. Covid put that on the back burner. We hope to start the social event again to collect toys. We have seen how the economy has devastated families and individuals. We have decided to help Stewpot. Stewpot has been in Jackson for decades and may be one of the most recognized charities. This organization serves food to “people who are hungry, offers shelter, clothing, mentioning, care and concern.” Our efforts will be in the collection of clothing for the Stewpot Clothing Closet. Of course, Stewpot also takes donations of food. If you can provide any clothing, please let us know. We have provided a list of the clothing needed by Stewpot. And please, gently used items of clothing. If you would prefer to make a cash donation, you do that online.
          - emphasis [ref=e188]: “If we all do a little something, everything will get done.” -
          - text: Merrida “Buddy” Coxwell
      - link "Click Here to Donate" [ref=e191] [cursor=pointer]:
        - /url: "https://stewpot-community-services.networkforgood.com/projects/90618-stewpot-community-services-everyday-giving-page.   "
