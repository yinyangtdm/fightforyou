          - strong [ref=e134]: personal injury
        - text: and
        - link "criminal defense" [ref=e135] [cursor=pointer]:
          - /url: /criminal-defense/
          - strong [ref=e136]: criminal defense
        - text: . We have been serving the needs of Mississippians since 1980 and have built a history of success. Our team is passionate about providing the highest quality of legal representation and service available. Our practice is not merely a business but a lifelong commitment to helping those in our community resolve their legal problems. We consider it a privilege to have represented individuals and families in our area for well over 40 years.
      - paragraph [ref=e137]:
        - text: We focus our practice in the above-limited areas to provide more highly skilled service to you. For example, family doctors address general medical conditions while cardiologists address serious issues involving your heart. Both are doctors, but they have different professional concentrations. At our firm, Attorney
        - link "Merrida Coxwell" [ref=e138] [cursor=pointer]:
          - /url: /our-team/merrida-buddy-coxwell/
        - text: has limited their areas of practice to fine-tune their skills within the civil and criminal frameworks in which we operate. We believe this approach better equips us to help you and serve your needs.
      - paragraph [ref=e139]:
