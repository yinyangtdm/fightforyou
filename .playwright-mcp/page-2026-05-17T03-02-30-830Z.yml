            - generic [ref=e111]:
              - heading "Criminal Defense" [level=3] [ref=e112]
              - paragraph [ref=e113]: The need for criminal defense representation arises in many different circumstances. We provide representation in a wide variety of cases involving investigations and prosecutions by both the federal government and state prosecutors in Philadelphia and the surrounding counties. Our cases involve any type of criminal charges, from allegations of violent crime and homicide to allegations of complex commercial fraud.
              - paragraph [ref=e114]: "We provide representation at any and all stages of the criminal process:"
              - list [ref=e115]:
                - listitem [ref=e116]: Grand Jury/law enforcement investigations
                - listitem [ref=e117]: Pre-charging negotiations
                - listitem [ref=e118]: Preliminary hearings
                - listitem [ref=e119]: Probable cause and detention hearings
                - listitem [ref=e120]: Plea bargaining
                - listitem [ref=e121]: Trial
                - listitem [ref=e122]: Sentencing
                - listitem [ref=e123]: Appeals
                - listitem [ref=e124]: Post-Conviction challenges to convictions and sentences (Post-Conviction Relief Act/Habeas Corpus)
