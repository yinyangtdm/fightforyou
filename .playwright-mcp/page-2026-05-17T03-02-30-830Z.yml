        - generic [ref=e67]:
          - paragraph [ref=e82]: Kairys, Rudovsky, Messing, Feinberg & Lin has, for the past 40 years, been a leader in the fields of civil rights law and criminal defense. Our areas of expertise in constitutional litigation include police misconduct, prisoner rights, search and seizure, and the protection of First Amendment rights.
          - generic [ref=e84]:
            - generic [ref=e88]:
              - heading "Civil Rights" [level=3] [ref=e89]
              - paragraph [ref=e90]:
                - text: Under the U.S. Constitution, all persons have certain rights that may not be violated by the government. When government actors violate these rights, the law provides for a remedy in the form of damages or an injunction (a court order prohibiting some action). We provide representation in cases involving violations of the
                - link "First" [ref=e91] [cursor=pointer]:
                  - /url: http://caselaw.lp.findlaw.com/data/constitution/amendment01/
                - text: ","
                - link "Fourth" [ref=e92] [cursor=pointer]:
