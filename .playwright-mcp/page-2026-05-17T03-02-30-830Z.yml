                - text: ","
                - link "Eighth" [ref=e95] [cursor=pointer]:
                  - /url: http://caselaw.lp.findlaw.com/data/constitution/amendment08/
                - text: ", and"
                - link "Fourteenth" [ref=e96] [cursor=pointer]:
                  - /url: http://caselaw.lp.findlaw.com/data/constitution/amendment14/
                - text: Amendments to the U.S. Constitution. Many of our cases are brought in federal court under a law called
                - link "Section 1983" [ref=e97] [cursor=pointer]:
                  - /url: http://codes.lp.findlaw.com/uscode/42/21/I/1983
                - text: .
              - paragraph [ref=e98]: "Our civil rights cases cover numerous issues, including the following:"
              - list [ref=e99]:
                - listitem [ref=e100]: "False arrest: an arrest without sufficient legal cause"
                - listitem [ref=e101]: "Excessive force/police brutality: the use of unnecessary physical force by police or correctional officers"
                - listitem [ref=e102]: "Unlawful conviction/incarceration: convictions or prison sentences based on the wrongful actions of police or prosecutors"
                - listitem [ref=e103]: "Denial of medical care to incarcerated people: failure to provide necessary care to address a prisoner’s serious medical needs"
                - listitem [ref=e104]: "Free speech: denials of the right to engage in free speech and political expression"
              - generic [ref=e106]:
