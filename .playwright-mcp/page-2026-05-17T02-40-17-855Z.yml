          - paragraph [ref=e416]:
            - text: At Sheff Law, our team approach to wrongful death and
            - link "personal injury law" [ref=e417] [cursor=pointer]:
              - /url: https://www.shefflaw.com/injury-types/
            - text: results in remarkable resolutions for our clients. We have proven our method consistently, providing our clients with unparalleled expertise and extraordinary outcomes. Recently, several of our cases have been widely publicized, including the wrongful death case of Leonel Rondon in the Merrimack Valley Columbia Gas Explosion, the wrongful death of Odin Lloyd at the hands of Aaron Hernandez and the Back Bay Fire tragedy.
          - heading "Personal Injury Settlements with Sheff Law" [level=2] [ref=e418]
          - paragraph [ref=e419]: Our team approach has evolved throughout Sheff Law’s 60 years of excellence in personal injury litigation in Massachusetts. Every Sheff Law client has a team of personal injury lawyers, including partners, who bring their individual experience and expertise to each case. This team approach ensures that each client receives superior communication and support from the first day they contact our Boston law firm to the final resolution of their personal injury case.
          - 'heading "Doug Sheff: Massachusetts Lawyer of the Year" [level=2] [ref=e420]'
          - paragraph [ref=e421]:
            - text: "Doug Sheff, one of the most accomplished personal injury lawyers in Boston, developed the team approach to leverage the most important element in personal injury cases: experience. No single attorney can fully appreciate all of the complex implications of"
