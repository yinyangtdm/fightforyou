    - generic [ref=e67]:
      - generic [ref=e69]:
        - heading "The Protection You Need For Employment Law And Civil Rights Issues" [level=2] [ref=e72]
        - paragraph [ref=e75]: As a dedicated employee, you deserve to feel safe, respected, and valued in your workplace. Unfortunately, many workers in Indiana continue to experience unfair treatment on the job. Attorney Christopher C. Myer has spent years advocating for individuals facing a wide range of employment-related legal issues, including harassment, discrimination, wage disputes, and retaliation. He has also served as counsel in numerous civil rights class action lawsuits across the state. Whether you’ve been mistreated due to your age, race, religion, or disability, we’re here to support you. Our goal is to help you understand your rights, seek justice, and move forward with confidence.
        - link "Book A Free Consultation" [ref=e79] [cursor=pointer]:
          - /url: https://www.myers-law.com/contact/
          - generic [ref=e81]: Book A Free Consultation
      - img "Employment Law And Civil Rights Issues" [ref=e86]
    - generic [ref=e92]:
      - heading "Building Up A Strong Criminal Defense For Frightening Times" [level=2] [ref=e97]
      - paragraph [ref=e102]: Criminal charges in Indiana are nothing to scoff at. Getting accused of a misdemeanor or felony can result in serious damage toward your life. You may spend time in jail, pay hefty fines and your criminal record can put hard limits on potential job prospects. You need someone who is familiar with the state’s laws and has practiced them for years so they can drastically reduce or eliminate these charges altogether. Thankfully, attorney Nicholas Wallace knows what’s at stake with your case and will do all he can to ensure you get the representation you need.
