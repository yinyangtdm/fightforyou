      - paragraph [ref=e246]: The decision to end a marriage is never easy. Whether you are initiating proceedings or your spouse is, you need assurance that you and your kids will be in as good of a position as possible once it is over. Attorney Caryn Wallace has helped hundreds of clients with the full range of family law issues, including divorce, child custody, child support and spousal maintenance. No case is too challenging or unique for Caryn. She helps make an often difficult and uncertain situation more predictable and reassuring.
