              - heading "Our Approach to Your Case" [level=2] [ref=e329]
              - paragraph [ref=e330]: When a client comes to us with a potential case, we start by reviewing the facts and determining how the state and federal laws apply. At our initial consultations, we can let you know if you have a case worth pursuing and what our next steps would be. Once a client hires us, we start the investigation process, which can include everything from interviewing witnesses to collecting records and documentation. Based on this information, we can begin putting together a legal strategy and determine which options make the most sense.
              - paragraph [ref=e331]: We keep the lines of communication open at all times, so you always know what’s happening and what step we’re at. We want our clients to be involved in the process and be able to make well-informed decisions regarding their cases.
