                - img "Decades of Proven Experience img" [ref=e540]
                - paragraph [ref=e542]: Decades of Proven Experience
                - paragraph [ref=e543]: At Kennedy Law Firm, our attorneys have over 75 years of combined experience helping those in New Mexico protect their rights and hold those who violate them responsible. We are familiar with both state and federal civil rights claims procedures, including the special provisions under the New Mexico Civil Rights Act.
              - generic [ref=e548]:
                - img "Strategic Legal Approach img" [ref=e550]
                - paragraph [ref=e552]: Strategic Legal Approach
                - paragraph [ref=e553]: Building a strong case starts with a clear understanding of what happened and what protection strategies we can use when pursuing a claim. Our attorneys review the facts of your case, identify potentially liable parties, and work with you to determine your goals for pursuing a legal resolution.
              - generic [ref=e558]:
                - img "Dedicated Civil Rights Advocates img" [ref=e560]
                - paragraph [ref=e562]: Dedicated Civil Rights Advocates
                - paragraph [ref=e563]: The attorneys at Kennedy Law Firm are dedicated civil rights advocates. We know what it takes to pursue a claim against institutions and public entities, such as a police department, and every member of our team is committed to holding both individuals and institutions that violate our clients’ civil rights accountable.
              - generic [ref=e568]:
                - img "Personalized Care and Attention img" [ref=e570]
                - paragraph [ref=e572]: Personalized Care and Attention
                - paragraph [ref=e573]: When you work with our firm, you’re not just a case number. We take the time to understand your unique situation and the events that led you to this place. Each case requires a tailored legal approach, and we make sure you have a full understanding of all your options as we move forward.
              - generic [ref=e578]:
                - img "Compassionate Legal Representation img" [ref=e580]
                - paragraph [ref=e582]: Compassionate Legal Representation
                - paragraph [ref=e583]: Having your civil rights violated can be an emotional and even traumatic experience. Our attorneys are experienced in navigating sensitive subjects, and we’re here to be an empathetic advocate you can trust.
              - generic [ref=e588]:
                - img "Strong Track Record of Results img" [ref=e590]
                - paragraph [ref=e592]: Strong Track Record of Results
                - paragraph [ref=e593]: We’re a recognized and trusted civil rights law firm, and we have a strong history of favorable settlements and results that speak for themselves. Our attorneys are skilled negotiators and litigators, meaning they are just as comfortable working on a fair settlement deal as they are taking your case to trial.
          - generic [ref=e595]:
            - figure [ref=e598]:
              - img "Kennedy Law Firm" [ref=e599]
            - generic [ref=e600]:
              - heading "Why You Need a New Mexico Civil Rights Attorney" [level=2] [ref=e602]
              - paragraph [ref=e603]: Civil rights cases generally focus on constitutional rights, and there may be multiple overlapping legal issues, such as direct abuse by a teacher and institutional liability arising from negligent hiring practices. An attorney can help you understand whether you have a claim, who could be liable, and what legal standards apply to your situation. Having a local New Mexico attorney can also help if you’re planning on filing a case under the New Mexico Civil Rights Act.
