              - heading "Do You Have a Civil Rights Violation Claim?" [level=2] [ref=e511]
              - paragraph [ref=e512]: While negative experiences with police officers or other people in power are unpleasant, they don’t always rise to the level of a civil rights violation. These cases generally involve a violation of rights protected by the state or the U.S. Constitution, and whether you can pursue a lawsuit depends on what rights the authority figure violated and the total circumstances of the case. This includes reviewing the facts of what happened, including looking at photos, videos, or other potential evidence, what actions were taken, and what impact the incident has had on your life since.
            - figure [ref=e515]:
              - img "Kennedy Law Firm" [ref=e516]
          - generic [ref=e518]:
