        - generic [ref=e61]: Police Misconduct Results - Obtained One of the Highest Settlements Paid in the State of Michigan
        - separator [ref=e62]
        - generic [ref=e63]:
          - heading "Police Misconduct - Framed for Murder (Malicious Prosecution)" [level=2] [ref=e64]
          - 'heading "Result: Client was found ''not guilty'' and received a six-figure settlement." [level=3] [ref=e65]':
            - strong [ref=e66]: "Result:"
            - text: Client was found 'not guilty' and received a six-figure settlement.
          - img "Criminal Defense Lawyer Detroit, MI | Marcel Benavides Law Firm - case1" [ref=e67]
          - paragraph [ref=e68]: Our client was framed by Pontiac police officers for the attempted murder of a police officer. He went to trial in the criminal case and was found not guilty of all charges. Charges that would have put him in prison for nearly 40 years. We alleged in our civil lawsuit that the main officer lied in his police report, lied to the prosecutor, lied on the stand at the preliminary examination, and even on the stand at the trial. We conducted our own investigation and proved that the officer lied about where our client originally ran and "threw" a gun... that was because the officer who lied was not aware that our client was wearing a global positioning satellite device (GPS tether) from an unrelated criminal matter. This tether tracked him running in a different direction. Our client was vindicated in his criminal trial and this matter was settled for well over six figures.
          - separator [ref=e69]
        - generic [ref=e70]:
          - heading "Police Brutality - Use of Excessive Force" [level=2] [ref=e71]
          - 'heading "Result: Client received a six-figure settlement." [level=3] [ref=e72]':
            - strong [ref=e73]: "Result:"
            - text: Client received a six-figure settlement.
          - img "Criminal Defense Lawyer Detroit, MI | Marcel Benavides Law Firm - case3" [ref=e74]
          - paragraph [ref=e75]: Our client was tasered and punched numerous times by the officers simply because he did not wish to engage in a conversation with one of the officers. Numerous officers broke into his home and attacked him while he held his daughter. Our client called all of the attorneys on TV and they all told him nobody would ever believe him. I believed him and recovered nearly six figures for him.
          - separator [ref=e76]
          - generic [ref=e77]:
            - text: Criminal Defense Results - We Don't Give Up Until Every Detail Of Your Case is Explored
            - paragraph [ref=e78]
          - separator [ref=e79]
