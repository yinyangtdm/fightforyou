              - text: All charges dropped.
            - img "Criminal Defense Lawyer Detroit, MI | Marcel Benavides Law Firm - case2" [ref=e84]
            - paragraph [ref=e85]: My client was under investigation for alleged conduct that mandated decades in prison. The allegations against my client were extremely harsh. Once retained, I was able to conduct a thorough investigation prior to the detective presenting the case for charges to the prosecutor's office. Our very own investigation of text messages, online social media, digital media and other evidence allowed us to prove that the complaining witness lacked credibility and no charges were approved and/or issued by the Wayne County Prosecutor's Office.
