              - heading "Accurate Logout Confirmation Screen" [level=2] [ref=e630]:
                - link "Accurate Logout Confirmation Screen" [ref=e631] [cursor=pointer]:
                  - /url: https://www.spg-law.com/accurate-logout-confirmation-screen/
              - generic [ref=e632]:
                - text: Published by
                - link "tee" [ref=e634] [cursor=pointer]:
