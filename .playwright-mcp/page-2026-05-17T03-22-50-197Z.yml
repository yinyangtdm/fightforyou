              - heading "Secure Authentication Flow Design" [level=2] [ref=e1308]:
                - link "Secure Authentication Flow Design" [ref=e1309] [cursor=pointer]:
                  - /url: https://www.spg-law.com/secure-authentication-flow-design/
              - generic [ref=e1310]:
                - text: Published by
                - link "tee" [ref=e1312] [cursor=pointer]:
                  - /url: https://www.spg-law.com/author/tee/
                - text: "on"
                - link "February 28, 2026" [ref=e1314] [cursor=pointer]:
