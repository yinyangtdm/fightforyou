              - heading "Direct Error Explanation Messages" [level=2] [ref=e1658]:
                - link "Direct Error Explanation Messages" [ref=e1659] [cursor=pointer]:
                  - /url: https://www.spg-law.com/direct-error-explanation-messages/
              - generic [ref=e1660]:
