              - heading "Clear Engagement Quality Metrics" [level=2] [ref=e586]:
                - link "Clear Engagement Quality Metrics" [ref=e587] [cursor=pointer]:
                  - /url: https://www.spg-law.com/clear-engagement-quality-metrics/
              - generic [ref=e588]:
                - text: Published by
