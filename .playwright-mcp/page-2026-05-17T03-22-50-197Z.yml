              - heading "Focused Engagement Pace Management" [level=2] [ref=e987]:
                - link "Focused Engagement Pace Management" [ref=e988] [cursor=pointer]:
                  - /url: https://www.spg-law.com/focused-engagement-pace-management/
              - generic [ref=e989]:
                - text: Published by
                - link "tee" [ref=e991] [cursor=pointer]:
                  - /url: https://www.spg-law.com/author/tee/
                - text: "on"
                - link "February 28, 2026" [ref=e993] [cursor=pointer]:
