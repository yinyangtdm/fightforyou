              - heading "Guided Timeout Configuration Flow" [level=2] [ref=e1769]:
                - link "Guided Timeout Configuration Flow" [ref=e1770] [cursor=pointer]:
                  - /url: https://www.spg-law.com/guided-timeout-configuration-flow/
              - generic [ref=e1771]:
                - text: Published by
