              - heading "Transparent Reward Program Logic" [level=2] [ref=e1097]:
                - link "Transparent Reward Program Logic" [ref=e1098] [cursor=pointer]:
                  - /url: https://www.spg-law.com/transparent-reward-program-logic/
              - generic [ref=e1099]:
                - text: Published by
                - link "tee" [ref=e1101] [cursor=pointer]:
                  - /url: https://www.spg-law.com/author/tee/
                - text: "on"
                - link "February 28, 2026" [ref=e1103] [cursor=pointer]:
