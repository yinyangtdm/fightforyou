  - heading "Our fight is for you, for your rights, and for the truth." [level=2] [ref=e41]
  - generic [ref=e43]:
    - paragraph [ref=e44]: At Grossman Roth Yaffa Cohen, we believe that the truth wins, and we are ruthless in our pursuit of the truth. When a victim of a catastrophic accident, medical malpractice, or other negligent conduct comes to us, we fight passionately to hold the wrongdoers accountable and to change the systems that enabled them.
    - paragraph [ref=e45]: Our mission is to get justice for you and expose the misdeeds of the negligent companies, healthcare providers, or others that caused you harm. We will strive to get you the financial compensation that you need after your tragedy, but for our attorneys and our clients, this fight goes further. In many of our cases, we also achieve changes to corporate policies, training requirements, medical procedures, and even laws to ensure that no one else has to suffer as you have.
  - paragraph [ref=e50]:
    - emphasis [ref=e51]: GRYC has been a voice for injured victims in the South Florida area since 1988.
    - emphasis [ref=e52]: Together, we will be heard.
    - emphasis [ref=e53]: Together, we can make change happen.
