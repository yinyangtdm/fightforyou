    - generic [ref=e369]:
      - heading "A Former Insurance Defense Attorney Fighting For You" [level=2] [ref=e372]
      - generic [ref=e373]:
        - generic [ref=e375]:
          - paragraph [ref=e376]: When an injury threatens to put your life on hold, put an attorney who has experienced both sides of the legal process in your corner. At Denning Law Firm, LLC, our key advantage lies in our attorney's previous work as an insurance defender. William Denning understands the tactics that the opposing party will attempt to use to deny you the fair compensation you deserve, and he's prepared to fight back against those tactics with confidence.
          - paragraph [ref=e377]: Whether you've been injured due to medical malpractice, a trucking accident, a faulty product, or another situation in which negligence was at play, you shouldn't have to suffer in silence. Our personal injury attorneys in Kansas City are ready and willing to help you take action. Together, we can strive to hold the parties responsible for your pain accountable for their careless behavior.
        - generic [ref=e379]:
          - paragraph [ref=e380]: "We know that dealing with the aftermath of an injury can be incredibly difficult, especially when that injury occurred through no fault of your own. Let us handle the legalities of your case so you can focus on what matters most: your health and well-being. We'll fight for the compensation you need to cover your lost wages, medical bills, pain and suffering, and more."
          - paragraph [ref=e381]: From cases involving wrongful death and catastrophic injuries to transportation law, construction litigation, and professional liability, we're here to help you overcome your personal injury. Let us be your voice and your pillar of strength as you recover. We proudly fight for injured individuals throughout Leawood, Olathe, Shawnee, and Lenexa, Kansas; and Kansas City, Missouri. Schedule a no-cost case review with our legal team in Overland Park, Kansas, today.
