              - heading "Championing Your Rights" [level=2] [ref=e110]
              - generic [ref=e112]: Cade Law Group will not only fight to get you justice, but we will also champion your rights along the way. We assist those who have experienced discrimination or mistreatment by law enforcement, employers, landlords, and government agencies. We work with businesses, families, and individuals to resolve a myriad of disputes fairly. When you need to stand up to bullies in the government, at work, or in the marketplace, we are in your corner.
