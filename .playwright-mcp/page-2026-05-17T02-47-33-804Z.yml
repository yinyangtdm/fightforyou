              - paragraph [ref=e56]: Welcome to Curcio Law, a personal injury law firm in Old Town Alexandria focused exclusively on representing people injured or killed because of the careless conduct of another. Our attorneys are committed to obtaining for each client the compensation they are legally entitled to so that they, and their families, can rebuild their lives with dignity after suffering a personal injury or death.
