              - heading "Seeking Justice For Victims Of Police Misconduct" [level=1] [ref=e59]
              - article [ref=e60]:
                - generic [ref=e61]:
                  - paragraph [ref=e62]: Since 1990, Schonbrun Seplow Harris Hoffman & Zeldes, LLP has built a record of results helping victims of police misconduct in Los Angeles and throughout California. Our strong attorneys are vigorous advocates who are willing to take on any opponent, including police departments, in order to do right for those who have been harmed.
                  - paragraph [ref=e63]:
                    - text: Call Schonbrun Seplow Harris Hoffman & Zeldes, LLP at
                    - link "310-396-0731" [ref=e65] [cursor=pointer]:
                      - /url: tel:+1-310-396-0731
                    - text: or
                    - link "send us an email" [ref=e66] [cursor=pointer]:
                      - /url: /contact/
                    - text: to schedule an initial consultation about your police misconduct claim.
                  - paragraph [ref=e67]: Allegations of police misconduct are frequent. Many people believe they were arrested without probable cause. Many people believe their constitutional rights were violated by an illegal search and seizure. There are also people who suffer much more serious forms of law enforcement misconduct. There are people who are seriously injured or even killed. There are people who are sent to prison for years before someone realizes that a mistake has been made and sets them free. These people truly deserve compensation and justice.
                  - paragraph [ref=e68]: "We frequently handle cases involving:"
                  - list [ref=e69]:
                    - listitem [ref=e70]:
                      - link "Excessive force" [ref=e71] [cursor=pointer]:
                        - /url: /police-misconduct/excessive-force/
                    - listitem [ref=e72]:
                      - link "False arrest and imprisonment" [ref=e73] [cursor=pointer]:
                        - /url: /police-misconduct/false-arrest-imprisonment/
                  - heading "Police Misconduct Comes In Many Forms" [level=2] [ref=e74]
                  - paragraph [ref=e75]: While excessive force and false arrest claims are perhaps the most common forms of police misconduct, our attorneys have seen many ways that police officers can abuse their power. For example, we handled a case involving a girl who was killed by gang members. The reason she was killed was because police officers falsely told them the girl had “snitched on them.” While these cases may be rare, they tend to be tragic. We can help.
                  - heading "We Will Take On The Police Department" [level=2] [ref=e76]
                  - paragraph [ref=e77]: We are trial lawyers, ready to go up against major opponents. To do this, we must take great care and thoroughly prepare the case. If you are considering getting in touch with us to take action, we encourage you to immediately start documenting. Keep medical records. Take photos of injuries. If there were witnesses, compile their names. Every detail could make a difference as we build your case to go up against the police.
                  - heading "Contact Us For A Free Initial Consultation" [level=2] [ref=e78]
                  - paragraph [ref=e79]:
                    - text: Call us at
                    - link "310-396-0731" [ref=e81] [cursor=pointer]:
                      - /url: tel:+1-310-396-0731
                    - text: or
                    - link "send us an email" [ref=e82] [cursor=pointer]:
                      - /url: /contact/
                    - text: . Because we handle most police misconduct cases on a contingency fee basis, ensuring we believe in you and your case.
