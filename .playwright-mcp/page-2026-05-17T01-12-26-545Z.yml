            - generic [ref=e164]:
              - heading "Pursuing Class Action Lawsuits" [level=2] [ref=e167]
              - paragraph [ref=e171]: If you have been injured by a defective product or suffered damages or loss due to misleading labeling or advertising, you may have a right to compensation. From suing a manufacturer over a defective product to filing a class action lawsuit against Trump University resulting in a $25 million settlement, we always fight ferociously for our clients – no matter who we are up against.
            - generic [ref=e177]:
              - heading "Aggressively Protecting Your Human and Civil Rights" [level=2] [ref=e180]
              - generic [ref=e183]:
                - paragraph [ref=e184]: When you are denied your basic human and civil rights, we are there to support you. We have successfully represented Burmese plaintiffs who sued Los Angeles-based Unocal Corporation for using forced labor during the construction of a natural pipeline in Burma and have brought to light unfair labor practices in Walmart’s supplier factories in a number of countries.
                - paragraph [ref=e185]: We aggressively fight for every individual’s basic rights – whether in California or around the world.
            - generic [ref=e187]:
              - generic [ref=e188]:
                - heading "Holding Employers Accountable" [level=2] [ref=e191]
                - generic [ref=e194]:
                  - paragraph [ref=e195]: All employees deserve to be treated with dignity and respect. Unfortunately, that’s not always the case. If your employer has violated wage and hour laws, subjected you to a hostile work environment or made you a victim of workplace discrimination, we are here to fight for you. It can be challenging and frightening, but you don’t have to fight alone.
                  - paragraph [ref=e196]: In some cases, you may not be alone. Your employer may be violating wage and hours for other employees as well. When this happens, we do a thorough investigation and may file a class action lawsuit against that employer, like we did against CVS on behalf of numerous pharmacists who received a $7.4 million settlement.
              - generic [ref=e197]:
                - heading "Advocating For Victims Of Police Misconduct And Wrongful Conviction" [level=2] [ref=e200]
                - generic [ref=e203]:
                  - paragraph [ref=e204]: Cellphones are accessible anytime and are often used to record interactions between citizens and law enforcement. Needless to say, incidents of police misconduct are being brought to our attention more frequently than ever.
                  - paragraph [ref=e205]: If you were a victim of police misconduct or were wrongfully convicted of a crime you didn’t commit, we will utilize all our resources to investigate your situation and work diligently for the best possible outcome.
