            - generic [ref=e345]:
              - heading "What Our Clients Say" [level=2] [ref=e350]
              - generic [ref=e353]:
                - generic "Slideshow" [ref=e354]:
                  - group "1 of 2" [ref=e356]:
                    - paragraph [ref=e361]: I can’t be more thankful for Helen and her team! I had a terrible experience with my employer of over 12 years after becoming pregnant and experiencing pregnancy discrimination and sexual harassment. The majority of my time at work was positive but the last year was a complex and traumatic experience. I found myself being pushed out after having my daughter. It is very hard to find a lawyer that will take the time to listen to you and to your story and to take your case on against a big company. Most lawyers want an easy win. I was lucky enough to find Helen and she took me on after hearing how badly I was treated, I was definitely the underdog. She and her team fought hard to stand up for my rights. They were all extremely professional, communicated with me and always treated me with respect. We ended up settling out of court which really was a blessing so that I could move on. I am so beyond thankful for this team and for their hard work. They are truly the best people!
